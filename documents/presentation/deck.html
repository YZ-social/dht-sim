<p><em>&quot;Those who would give up essential Liberty, to purchase a little temporary Safety, deserve neither Liberty nor Safety.&quot;</em> — Benjamin Franklin</p>
</blockquote>
<br />
<p><strong>Privacy is the precondition for free expression and association.</strong> A communication channel that always passes through a trusted intermediary leaks the <em>fact</em> of the conversation even when the contents are encrypted. Knowing <em>who talked to whom, when, from where</em> is, on its own, a powerful surveillance signal — used commercially for advertising and behavioral inference, used institutionally for law enforcement and intelligence.</p>
<p><strong>End-to-end encryption is not enough.</strong> Encryption protects message contents but not metadata. As long as the routing fabric belongs to a single party — a server, a federation, an ISP — that party retains visibility into the network's <em>shape</em>, and that visibility is itself the asset.</p>
<p><strong>A peer-to-peer routing fabric removes the custodian.</strong> No server, no privileged peer, no trusted coordinator: the routing layer itself becomes a participant-symmetric primitive in which no one party has a privileged view of the traffic.</p>
<p><span class="callout">The DHT is the minimum viable substrate for that property. Without it, every &quot;decentralized&quot; service is one trusted server away from being centralized again.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-a-dht-why-we-need-them">What is a DHT? Why we need them</h2>
<p>A <strong>distributed hash table</strong> is the foundation for finding <em>anything</em> in a decentralized network: any node, given a key, can locate the value in O(log N) hops with <strong>no central authority, no privileged peer, no trusted coordinator</strong>.</p>
<p><strong>Already in production at scale:</strong></p>
<table>
<thead>
<tr>
<th>System</th>
<th style="text-align:right">Year</th>
<th>Built on</th>
</tr>
</thead>
<tbody>
<tr>
<td>BitTorrent Mainline DHT</td>
<td style="text-align:right">2005+</td>
<td>Kademlia variant — millions of simultaneous nodes</td>
</tr>
<tr>
<td>Ethereum devp2p</td>
<td style="text-align:right">2015+</td>
<td>Modified Kademlia — peer discovery for blockchain consensus</td>
</tr>
<tr>
<td>IPFS / libp2p</td>
<td style="text-align:right">2015+</td>
<td>Kademlia + content routing — CID → provider mapping</td>
</tr>
<tr>
<td>Tor v3 hidden services</td>
<td style="text-align:right">2017+</td>
<td>HSDir DHT — onion-service descriptor lookup</td>
</tr>
<tr>
<td>Coral DSHT</td>
<td style="text-align:right">2004</td>
<td>Latency-aware proximity clusters — production CDN 2004 – ~2015</td>
</tr>
<tr>
<td>S/Kademlia</td>
<td style="text-align:right">2007</td>
<td>Security-hardened Kademlia (sibling broadcast, disjoint paths)</td>
</tr>
</tbody>
</table>
<p><strong>Why a next generation now:</strong></p>
<p>The systems above were designed for one workload at a time — file-sharing, blockchain peer discovery, content addressing — on networks of stable nodes. <strong>NH-1 targets a different deployment</strong>: heterogeneous device classes (browser to server), high churn, integrated pub/sub, and locality awareness as a first-class property of routing rather than a layered afterthought.</p>
<p><span class="callout">The next-generation DHT is not &quot;Kademlia plus locality.&quot; It is a routing fabric that <strong>adapts</strong> — that learns from the traffic it carries and survives the network it actually lives on.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="long-term-potentiation--the-biology-behind-the-design">Long-Term Potentiation — the biology behind the design</h2>
<p>The brain and a DHT face the <strong>same engineering problem</strong>: a node with a fixed budget of connections, a flood of competing signals, and a need to remember which paths actually carry useful traffic. Evolution solved it once. We borrow the solution.</p>
<p><strong>Long-Term Potentiation (LTP)</strong> is the canonical mechanism for synaptic learning, discovered by Bliss &amp; Lømo in rabbit hippocampus (1973). When two neurons fire together repeatedly across the same synapse, that synapse <strong>persistently strengthens</strong> — change that outlasts the stimulus by hours, days, a lifetime.</p>
<br />
<p><strong>The molecular cascade, simplified:</strong></p>
<ul>
<li><strong>NMDA receptors</strong> act as coincidence detectors — glutamate from the pre-synaptic neuron only opens them if the post-synaptic neuron is <em>already</em> depolarized. The signal is &quot;I fired <em>and</em> you fired.&quot;</li>
<li>Calcium influx triggers <strong>AMPA receptor insertion</strong> into the post-synaptic membrane, increasing sensitivity for next time.</li>
<li>Within ~30 minutes the change is consolidated: gene transcription, new protein synthesis, sometimes new dendritic spines. The synapse is durably re-weighted.</li>
</ul>
<p><strong>The opposing process is LTD</strong> (Long-Term Depression): low-frequency stimulation <em>weakens</em> synapses. LTP and LTD together are the brain's way of <em>learning</em> — adjusting which routes among neurons are easy to traverse.</p>
<br />
<p>The intuitive summary, from Donald Hebb's <em>Organization of Behavior</em> (1949):</p>
<p><span class="callout"><strong>&quot;Neurons that fire together, wire together.&quot;</strong><br />This is the <strong>Hebbian rule</strong> — and it's what every weight in every artificial neural network ultimately abstracts. The Neuromorphic DHT applies it not to perception, but to <em>routing</em>.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="from-neuron-to-routing-table">From neuron to routing table</h2>
<p>The translation is direct, not metaphorical. The brain and a peer-to-peer overlay are both networks of capacity-limited nodes that must learn from traffic which edges to keep.</p>
<br />
<table>
<thead>
<tr>
<th>Neuroscience</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Synapse</strong> — a connection between neurons</td>
<td>A peer entry in the routing table (<code>Synapse</code> class)</td>
</tr>
<tr>
<td><strong>Synaptic weight</strong> — readiness to fire next time</td>
<td><code>weight ∈ [0, 1]</code></td>
</tr>
<tr>
<td><strong>LTP</strong> — co-firing strengthens the connection</td>
<td>Successful lookup increments weights along the traversed edges (<code>_reinforceWave</code>)</td>
</tr>
<tr>
<td><strong>LTD</strong> — disuse weakens</td>
<td>Time-based decay each tick (<code>weight *= decayGamma</code>)</td>
</tr>
<tr>
<td><strong>NMDA coincidence detection</strong> — both ends must participate</td>
<td>Weight only increments when the synapse actually carried successful traffic, not on every probe</td>
</tr>
<tr>
<td><strong>Synaptic tagging</strong> (Frey &amp; Morris 1997) — recently potentiated synapses are protected from overwriting</td>
<td>NH-1's <code>inertiaDuration</code> epochs prevent eviction of recently reinforced synapses</td>
</tr>
<tr>
<td><strong>Pruning</strong> — neurons with weak / unused connections lose them</td>
<td><code>_addByVitality</code> evicts the lowest-vitality (<code>weight × recency</code>) edge to make room</td>
</tr>
</tbody>
</table>
<p><span class="callout"><strong>The N-DHT is the Hebbian rule applied to overlay routing.</strong> Every &quot;weight,&quot; every &quot;synapse,&quot; every &quot;potentiation&quot; in this deck refers to a precise, measurable mechanism in the source code — see <em>NeuronNode.js</em>, <em>Synapse.js</em>, and the <code>_reinforceWave</code> / <code>_addByVitality</code> methods that implement LTP and pruning directly.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="the-neuromorphic-dht--how-it-differs">The Neuromorphic DHT — how it differs</h2>
<p>Traditional DHTs (Kademlia, Pastry, Tapestry) treat the routing table as a <strong>static data structure</strong>: fixed buckets, one rule for replacement, no awareness of the traffic flowing through. They were designed in 2001-2002 for stable nodes — and they do not adapt to the network they live in.</p>
<p>The <strong>Neuromorphic DHT</strong> treats every peer as a <em>synapse</em>: a learnable edge with a weight that grows with successful traffic (LTP) and decays without it (LTD). Routing consults those weights. Eviction picks the least-vital edge. The table changes as the network changes.</p>
<table>
<thead>
<tr>
<th></th>
<th>Traditional DHT</th>
<th>Neuromorphic DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td>Routing table</td>
<td>Fixed K-bucket per stratum</td>
<td>Weighted <strong>synaptome</strong> <em>(the per-node set of weighted outgoing edges)</em></td>
</tr>
<tr>
<td>Edge state</td>
<td>Live / dead</td>
<td>Weight ∈ [0, 1], recency, locked-on-use</td>
</tr>
<tr>
<td>Routing decision</td>
<td>Greedy XOR</td>
<td>Action Potential (XOR × weight × latency)</td>
</tr>
<tr>
<td>Adapts to traffic?</td>
<td>No</td>
<td>Yes — Long-Term Potentiation (<strong>LTP</strong>), triadic closure, hop caching</td>
</tr>
<tr>
<td>Adapts to churn?</td>
<td>Lazy bucket refresh</td>
<td>Active dead-peer eviction + temperature reheat</td>
</tr>
<tr>
<td>Pub/sub</td>
<td>Layered on top</td>
<td>Integrated as axonal delivery trees</td>
</tr>
<tr>
<td><strong>Global lookup at 50 K</strong> (× Dabek 3δ floor)</td>
<td>Kademlia <strong>548 ms (2.65×)</strong> — worsens with N</td>
<td>NX-17 <strong>243 ms (1.18×)</strong> — plateaus at the floor</td>
</tr>
</tbody>
</table>
<br />
<p>The trade is &quot;fixed and analytical&quot; → &quot;adaptive and empirical&quot;. The whitepaper-correctness of K-buckets gives way to <em>measured</em> behavior — which is why the rest of this presentation is about measurement.</p>
<p><span class="callout"><strong>Headline result.</strong> On 50 K nodes, NX-17 sits within 36 ms of the analytical lower bound that Dabek et al. (NSDI 2004) proved for <em>any</em> recursive O(log N) DHT — <code>total ≈ 3δ</code> where δ is the median pairwise one-way round-trip time. Kademlia is 2× further from that floor. The full 3δ floor analysis appears later in the deck (the <em>3δ floor</em> section).</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="pubsub-belongs-in-the-network">Pub/sub belongs in the network</h2>
<p><strong>The end-to-end argument</strong> (Saltzer, Reed, Clark, 1984): functions that can be implemented at the endpoints should be implemented at the endpoints. Put nothing in the network that doesn't <em>have</em> to be there.</p>
<p><strong>Pub/sub routing has to be there.</strong> A subscriber and a publisher cannot, end-to-end, discover the multicast paths that connect them — only the network can. Treating pub/sub as a separate &quot;application overlay&quot; forces it to reproduce the routing layer with no actual visibility into it. The end-to-end principle applies to <em>meaning</em>; <strong>delivery is a network function</strong>.</p>
<p><strong>A decentralized DHT is the right place for it.</strong> Every node is <em>both</em> an endpoint and a relay. The mechanism is content-blind: it routes bytes toward a topic, with no inspection and no control over what travels.</p>
<br />
<p><strong>Consequences:</strong></p>
<ul>
<li><strong>Everyone becomes a broadcaster</strong> — peer-symmetric, no privileged position, no central authority.</li>
<li>The network is <strong>not smart</strong>. It has no control over the information it carries.</li>
<li>It is a <strong>protocol and a platform</strong> for relaying that information.</li>
<li>It is <strong>hyper-connected</strong>, within the physical limits of a phone or a browser.</li>
</ul>
<br />
<p><span class="callout">This is the architectural commitment NH-1 inherits from the start. The whole DHT exists to make this delivery primitive viable.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="why-a-simulator">Why a simulator</h2>
<p>The environment our system runs on is <strong>the Internet</strong>.</p>
<p>We have attempted to build as fair and realistic environment simulation as we could. The interface and services it provides to system components will be identical to those of an actual deployed system.</p>
<p><strong>This matters because</strong> after launch there is no easy way to monitor, repair or improve the network we deployed. By design we <em>can't</em>. The only honest path is a simulated Internet large enough for us to have a reasonable expectation of <em>verisimilitude</em> to study.</p>
<p><strong>And everyone can see it.</strong> Source, data, every CSV in this deck — all open.</p>
<br />
<p><span class="callout">&quot;As close to the actual system as possible&quot; does not mean <em>good</em>. It means: this is what we have right now. We will continue improving it.</span></p>
<p><span class="muted">Why do we do this? Because we <em>can't</em> track how information flows through the real system. We can't understand it — much less figure out how to repair it or improve it — without the ability to simulate it.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<h2 id="the-lab-bench">The lab bench</h2>

<p>Purpose-built simulator · ~25 K lines of JavaScript · open-source.</p>
<p><strong>Modeled with fidelity</strong></p>
<ul>
<li>GeoJSON land mask; haversine distances</li>
<li>Up to 50 000 nodes on a navigable 3-D globe</li>
<li>Per-hop simulated latency including 10 ms transit cost</li>
<li>Bilateral connection caps mirroring WebRTC (Web Real-Time Communication) limits</li>
<li>Every hop, ACK, reroute captured</li>
</ul>
<p><strong>Abstracted</strong></p>
<ul>
<li>No wall-clock transport or encryption</li>
<li>In-process node identity</li>
</ul>
<p><strong>Reproducibility</strong></p>
<ul>
<li>All protocols build from the <em>same</em> seeded node set</li>
<li>CSV export per run — every number in this deck is from <code>results/*.csv</code></li>
</ul>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="simulator-integrity">Simulator integrity</h2>
<p>Five invariants govern every measurement in this deck: <strong>(1)</strong> the bilateral connection cap is honestly enforced (a base-class guard rail audits <code>connections.size ≤ maxConnections</code> at post-init, post-warmup, and after every churn round); <strong>(2)</strong> locality is preserved — no optimization reads another node's routing table directly; <strong>(3)</strong> RPC responses are bounded to k=20 peers, the envelope a real WebRTC node could actually return; <strong>(4)</strong> per-protocol parameters reach the protocol they were configured for, with no silent defaults; <strong>(5)</strong> the geographic prefix width is a runtime parameter that flows into every protocol's node-ID construction, including the <code>geoBits = 0</code> ablation runs.</p>
<br />
<p><span class="callout"><strong>Every invariant on this list has been violated at least once during development.</strong> The deck shows post-fix measurements only. Skepticism is the methodology, not a hindrance.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="naming-as-compact-vocabulary">Naming as compact vocabulary</h2>
<p>Four terms from neuroscience, each mapping to a specific data structure.</p>
<table>
<thead>
<tr>
<th>Term</th>
<th>Maps to</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Synapse</strong></td>
<td>One directed <em>outgoing</em> routing edge with a learned weight ∈ [0, 1]</td>
</tr>
<tr>
<td><strong>Synaptome</strong></td>
<td>The full set of outgoing synapses at a node — bounded at <strong>50</strong></td>
</tr>
<tr>
<td><strong>Neuron</strong></td>
<td>A node: synaptome + temperature + message handlers</td>
</tr>
<tr>
<td><strong>Axon</strong></td>
<td>A directed delivery tree for one pub/sub topic, grown by routed subscribe</td>
</tr>
</tbody>
</table>
<br />
<p>The vocabulary is descriptive, not metaphorical. Every term has one and only one corresponding artifact in the source code.</p>
<p><span class="muted"><strong>Capacity note.</strong> 50 is the cap on <em>outgoing</em> synapses. The total bilateral connection budget per node is <strong>100</strong> peers (≈ 50 outgoing + 50 inbound) — chosen as a safe cross-browser WebRTC target. Both numbers are pragmatic: they match the practical ceiling of a typical browser, but the precise split is somewhat arbitrary.</span></p>

<h2 id="glossary--terms-used-across-this-deck">Glossary — terms used across this deck</h2>
<p>This work spans DHT engineering, reinforcement-learning ideas, and neuroscience. A reader expert in one domain may not know the others' vocabulary. Each term has a fuller treatment later in its dedicated slide.</p>
<table>
<thead>
<tr>
<th>Term</th>
<th>Domain</th>
<th>One-line definition</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>K-bucket</strong></td>
<td>DHT (Kademlia)</td>
<td>Per-stratum routing-table slot, holding up to K=20 peers at a given XOR distance</td>
</tr>
<tr>
<td><strong>XOR distance</strong></td>
<td>DHT</td>
<td>The Kademlia metric <code>d(a,b) = a ⊕ b</code> — symmetric, halving-friendly</td>
</tr>
<tr>
<td><strong>Stratum</strong></td>
<td>DHT</td>
<td>One XOR-distance level. Stratum <em>b</em> = peers whose IDs first differ from yours at bit <em>b</em>. Higher <em>b</em> = farther in ID-space</td>
</tr>
<tr>
<td><strong>K-closest</strong></td>
<td>DHT</td>
<td>The K nodes whose XOR distance to a target is smallest — used in routing and replication</td>
</tr>
<tr>
<td><strong>Churn</strong></td>
<td>DHT</td>
<td>Nodes joining and leaving; measured here as % of original network replaced</td>
</tr>
<tr>
<td><strong>Sponsor-chain bootstrap</strong></td>
<td>DHT</td>
<td>A new node joins by routing through an existing peer; its routing table fills from observed traffic</td>
</tr>
<tr>
<td><strong>AP score</strong> <em>(Action Potential)</em></td>
<td>N-DHT</td>
<td>The learned-weight ranking on candidate next-hops — combines XOR progress, weight, and latency. See <em>NAVIGATE</em></td>
</tr>
<tr>
<td><strong>Anneal / annealing</strong></td>
<td>RL</td>
<td>Gradually reduce randomness over time, transitioning from exploration to exploitation. Temperature ↓ over lookups</td>
</tr>
<tr>
<td><strong>Epsilon-greedy</strong></td>
<td>RL</td>
<td>With probability ε take a random action; otherwise take the best-known. Cheap insurance against premature lock-in</td>
</tr>
<tr>
<td><strong>Vitality</strong></td>
<td>N-DHT</td>
<td>The unified <code>weight × recency</code> score that drives every admission and eviction decision. See <em>FORGET</em></td>
</tr>
<tr>
<td><strong>Synapse / Synaptome / Neuron / Axon</strong></td>
<td>Neuro → N-DHT</td>
<td>The four mapping anchors — see the <em>Naming</em> slide above</td>
</tr>
</tbody>
</table>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="protocols-we-will-examine">Protocols we will examine</h2>
<p>We benchmark four DHTs at 25 K nodes under identical conditions. Each builds on its predecessor:</p>
<table>
<thead>
<tr>
<th>Protocol</th>
<th>What it adds</th>
<th>Inherits from</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>K-DHT</strong> (Kademlia, 2002)</td>
<td>XOR distance metric, K-buckets, α-parallel lookup</td>
<td>—</td>
</tr>
<tr>
<td><strong>G-DHT</strong> (geographic, this work, 2025)</td>
<td>S2 cell prefix in node IDs ⇒ regional locality</td>
<td>K-DHT</td>
</tr>
<tr>
<td><strong>NX-17</strong> (predecessor state of the art, <strong>SOTA</strong>)</td>
<td>18 specialized rules, peak performance under tight cap</td>
<td>G-DHT <em>(via NX-1 … NX-15)</em></td>
</tr>
<tr>
<td><strong>NH-1</strong> (this work, 2026)</td>
<td>Vitality-driven synaptome, unified admission gate</td>
<td><strong>NX-17</strong> <em>(consolidation)</em></td>
</tr>
</tbody>
</table>
<br />
<p>NH-1 is <em>not</em> a fresh parallel design — it is the result of a careful analysis of NX-17 and every protocol before it. Each NX-17 rule was studied for what it does, why it was added, and whether its work could be folded into a smaller surface area.</p>
<ul>
<li><strong>NX-17</strong> carries the lineage: 18 specialized rules, 44 parameters, ~2300 lines.</li>
<li><strong>NH-1</strong> consolidates that lineage: 12 rules, 12 parameters, ~270 lines — every admission decision through a single vitality score.</li>
</ul>
<br />
<p><span class="callout">We selected NH-1 as the deployment target for its <strong>maintainability and understandability</strong>. We continue to use NX-17 as the reference benchmark — the bar that NH-1 should approach, and that future work should match or surpass.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="k-dht--kademlia-the-foundation">K-DHT — Kademlia, the foundation</h2>
<p><strong>Distance metric:</strong> XOR — <code>d(a, b) = a ⊕ b</code><br />
<strong>Routing table:</strong> Every node maintains K peers per bucket. Lookup is a greedy walk toward the target in XOR distance, with α=3 parallel queries and K=20.<br />
<strong>Properties:</strong> O(log N) hops in steady state. Static, predictable, analyzable.</p>
<br />
<table>
<thead>
<tr>
<th>Limit</th>
<th>Evidence at 25 K</th>
</tr>
</thead>
<tbody>
<tr>
<td>No locality awareness</td>
<td>500 km lookup = <strong>510 ms</strong> — identical to its 499 ms global lookup</td>
</tr>
<tr>
<td>Fixed buckets</td>
<td>Same K peers regardless of usefulness; no response to traffic</td>
</tr>
<tr>
<td>Lazy churn repair</td>
<td>Broken edges persist until next bucket refresh</td>
</tr>
<tr>
<td>Broadcast cost O(audience)</td>
<td>Each pub/sub recipient reached by an independent lookup</td>
</tr>
</tbody>
</table>
<br />
<p><span class="muted">K-buckets were a 2002 answer to &quot;what's a stable routing table?&quot; — static, predictable, analyzable. We will argue that adaptive weighting does better in practice.</span></p>
<p><span class="callout">The data structure is frozen. The network is not.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="g-dht--adding-geographic-locality">G-DHT — adding geographic locality</h2>
<p><strong>The change:</strong> <code>nodeId = S2 cell prefix (8 bits) ‖ H(publicKey)</code>.</p>
<p>XOR in the ID space now approximates XOR in physical distance — the prefix dominates. Same K-bucket routing as Kademlia, no other changes.</p>
<br />
<p><strong>Result at 25 K:</strong></p>
<ul>
<li>500 km regional latency: 510 ms → <strong>150 ms</strong> (3.4× faster)</li>
<li>Global latency: 498 ms → <strong>287 ms</strong></li>
</ul>
<br />
<p>But still a <em>static</em> routing algorithm. No learning. No dynamics. The geographic prefix is a one-time topology decision, not an ongoing adaptation. Pub/sub is still bolted on top via K-closest replication, which drifts under churn.</p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="the-s2-library--what-the-cell-prefix-actually-is">The S2 library — what the cell prefix actually is</h2>

<p><strong>S2 (Google, 2011)</strong> is a hierarchical decomposition of the sphere onto a Hilbert space-filling curve, projected through six cube faces. Every point on Earth maps to a 64-bit cell ID; every prefix length defines a successively coarser tile.</p>
<ul>
<li><strong>Top 8 bits</strong> — 3 bits encode the cube face (values 0 – 5; six faces, two unused encodings) and the next 5 bits subdivide that face along the Hilbert curve. <strong>6 × 32 = 192 tiles</strong> worldwide, each ≈ <strong>continent-scale</strong> (e.g. &quot;western North America&quot;, &quot;South-East Asia&quot;). This is what we embed in every node ID.</li>
<li><strong>Hilbert curve property</strong> — geographically adjacent points have numerically close cell IDs. XOR distance in ID space ≈ physical distance, <em>for free</em>.</li>
<li><strong>Sub-cell hierarchy</strong> — refining the prefix bit-by-bit subdivides the tile in half along the Hilbert curve. 30 bits ≈ city block; 40+ bits ≈ metres.</li>
</ul>
<p><span class="callout">S2 gives us <strong>locality for free</strong> — at the cost of trusting that nodes don't lie about where they are.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="s2--security-implications">S2 — security implications</h2>
<p>The S2 prefix in a node ID is <strong>self-declared</strong>. A node can claim any prefix it wants. This has three consequences:</p>
<ul>
<li><strong>The S2 prefix is not a trust primitive.</strong> Never use it for authorisation, regional permissions, or anything resembling a capability check.</li>
<li><strong>Prefix-forgery is real.</strong> A malicious actor can pick a prefix to land in a different region. The benign failure mode is degraded routing (mis-located peers misroute traffic). The adversarial failure mode is a <strong>Sybil swarm</strong> in a target cell — many forged identities clustering on one region's address space.</li>
<li><strong>Proof-of-location is the obvious defense.</strong> Verifiable round-trip time (<strong>RTT</strong>) triangulation, GPS attestation, or trusted-witness schemes could anchor a claimed prefix to a measurable physical reality. This remains future work.</li>
</ul>
<br />
<p><span class="muted">The honest framing: today's locality is a <em>cooperative</em> primitive. It works because well-behaved peers don't lie. The protocol does not depend on the prefix being honest, but its locality benefits do — and an attacker can degrade them without affecting correctness.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="nh-1--our-chosen-design">NH-1 — our chosen design</h2>
<p><strong>The change:</strong> every peer becomes a <em>synapse</em> with a learnable weight. The routing table is no longer fixed K-buckets — it is a <strong>synaptome</strong> that adapts to traffic, prunes by vitality, and grows via learning rules (LTP, triadic closure, hop caching).</p>
<p><strong>The architectural arc:</strong></p>
<ul>
<li><strong>Inherits</strong> the entire NX lineage (NX-1 → NX-17): K-DHT's XOR metric, G-DHT's geographic prefix, NX-17's AP routing, LTP, triadic closure, hop caching, axonal pub/sub</li>
<li><strong>Consolidates</strong> five separate admission mechanisms (stratified eviction, two-tier highway, stratum floors, synaptome floors, adaptive decay) into a single vitality gate</li>
<li><strong>Removes</strong> rules whose contribution didn't measurably justify their parameter footprint</li>
<li><strong>Keeps</strong> every behavioral surface that NX-17 measurably needed</li>
</ul>
<br />
<p><strong>Design priority: simplicity.</strong></p>
<table>
<thead>
<tr>
<th></th>
<th style="text-align:right">NX-17</th>
<th style="text-align:right"><strong>NH-1</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td>Rules</td>
<td style="text-align:right">18</td>
<td style="text-align:right"><strong>12</strong></td>
</tr>
<tr>
<td>Parameters</td>
<td style="text-align:right">44</td>
<td style="text-align:right"><strong>12</strong></td>
</tr>
<tr>
<td>Lines of code</td>
<td style="text-align:right">~2300</td>
<td style="text-align:right"><strong>~270</strong></td>
</tr>
<tr>
<td>Admission gate</td>
<td style="text-align:right">5 mechanisms (stratified eviction, two-tier, stratum floors, synaptome floors, adaptive decay)</td>
<td style="text-align:right"><strong>1</strong> (<code>_addByVitality</code>)</td>
</tr>
</tbody>
</table>
<br />
<p><span class="callout">We accept a small performance gap against NX-17 in exchange for an architecture that one engineer can hold in their head — and that future engineers can extend without archeology.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="nx-17--the-reference">NX-17 — the reference</h2>
<p><strong>Two research generations led here.</strong></p>
<p><strong>Launch pad: N-1 → N-15W.</strong> The original neuromorphic DHT family — fifteen-plus variants — explored the design space: synapses with weights, activation potentials, simulated annealing, hop caching, lateral spread, dendritic relay trees. Each pushed on one mechanism and exposed two new failure modes. By N-15W we had a working but tangled protocol with too many entangled rules to refactor in place.</p>
<p><strong>Focused iteration: NX-1 → NX-17.</strong> The NX series re-grounded the architecture from a clean base. Each generation (NX-1, NX-2W, NX-3, … NX-17) addressed <em>one</em> concrete failure observed in its predecessor — one rule at a time, each measured against a benchmark. <strong>NX-17 is the result.</strong></p>
<br />
<p>NX-17 is <em>better</em> than NH-1 under tight connection caps — by a small but real margin (~9 % global ms, ~18 % regional ms; head-to-head numbers in the <em>NH-1 vs NX-17</em> slide later in the deck).</p>
<p>It carries 18 specialized rules, 44 parameters, and ~2300 lines. Each rule earned its keep against a measured failure mode. Together they form a system hard to understand and hard to extend.</p>
<br />
<p><span class="callout">We use NX-17 as the <strong>reference benchmark</strong>. The full rule list — and NH-1's disposition for each — appears in the <em>NX-17 → NH-1 disposition</em> table later in the deck.</span></p>

<h2 id="nh-1-in-one-slide--five-operations-one-vitality-model">NH-1 in one slide — five operations, one vitality model</h2>
<p>NH-1 collapses the entire protocol into <strong>five operations</strong>, each scored by a unified vitality function.</p>

<thead>
<tr>
<th>Operation</th>
<th>What it does</th>
</tr>
</thead>

<tr>
<td><strong>NAVIGATE</strong></td>
<td>Action Potential (<strong>AP</strong>) routing + 2-hop lookahead + iterative fallback</td>
</tr>
<tr>
<td><strong>LEARN</strong></td>
<td>LTP, hop caching, triadic closure, incoming promotion</td>
</tr>
<tr>
<td><strong>FORGET</strong></td>
<td>Continuous decay + vitality-based eviction</td>
</tr>
<tr>
<td><strong>EXPLORE</strong></td>
<td>Temperature annealing + epsilon-greedy first hop</td>
</tr>
<tr>
<td><strong>STRUCTURE</strong></td>
<td>Stratified bootstrap + mixed-capacity (highway) deployment</td>
</tr>
</tbody>
</table>
<br />
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>vitality(syn) = weight × recency
</code></pre>
<p>A single <code>_addByVitality()</code> admission gate replaces stratified eviction, two-tier highway management, stratum floors, synaptome floors, and adaptive decay. <strong>~12 parameters</strong> end-to-end.</p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-we-call-vitality">What we call vitality</h2>
<p>NH-1 admits and evicts every synapse via one scalar:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>vitality(syn) = weight × recency(syn)
</code></pre>
<p><strong>weight</strong> ∈ [0, 1] — trained by Long-Term Potentiation; reinforced on successful routing paths; decayed each tick by <code>γ = 0.995</code>.</p>
<p><strong>recency</strong> = <code>exp(−Δepoch / RECENCY_HALF_LIFE)</code>. Two parameters control the time scale, both in NH-1's 12-parameter budget:</p>
<ul>
<li><strong><code>INERTIA_DURATION = 20</code> epochs</strong> — after a reinforcement, recency is locked to 1.0 for 20 lookups. This is the LTP protection window: a freshly used synapse cannot be evicted, regardless of vitality competition. Below this, learning would be self-destructive — the system would discard the very edges it just discovered to be useful.</li>
<li><strong><code>RECENCY_HALF_LIFE = 50</code> epochs</strong> — once the inertia window expires, recency decays exponentially with a half-life of 50 lookups. After ~150 lookups with no reinforcement, recency is below 0.13 and the synapse is highly evictable.</li>
</ul>
<br />
<p>The two factors are conventional individually. Hebbian potentiation (Hebb, 1949) gives the weight; exponential decay since last use (Ebbinghaus, 1885; LRU-K caching, O'Neil 1993) gives the recency. The closest biological analog is <strong>synaptic tagging and capture</strong> (Frey &amp; Morris, <em>Nature</em> 1997) — synapses with both recent activity <em>and</em> sufficient potentiation are preferentially retained.</p>
<br />
<p><span class="callout">The contribution of NH-1 is <em>not</em> the term or the formula. It is the use of this product as a <strong>single admission gate</strong> replacing five specialized mechanisms in NX-17: stratified eviction, two-tier highway management, stratum floors, synaptome floors, and adaptive decay.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="nh-1-rules--the-full-set-by-operation">NH-1 rules — the full set, by operation</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Rule</th>
<th>Operation</th>
<th>Why this rule</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>Stratified bootstrap</td>
<td>STRUCTURE</td>
<td>Cold-start coverage across all XOR distances</td>
</tr>
<tr>
<td>2</td>
<td>Mixed-capacity (highway%)</td>
<td>STRUCTURE</td>
<td>Realistic deployment — some peers run on real servers</td>
</tr>
<tr>
<td>3</td>
<td>AP routing</td>
<td>NAVIGATE</td>
<td>Learned-weight greedy walk dominates pure XOR</td>
</tr>
<tr>
<td>4</td>
<td>Two-hop lookahead</td>
<td>NAVIGATE</td>
<td>One probe of α second-hop options unblocks dead ends</td>
</tr>
<tr>
<td>5</td>
<td>Iterative fallback</td>
<td>NAVIGATE</td>
<td>If no progress, expand to k-closest from the synaptome</td>
</tr>
<tr>
<td>6</td>
<td>Long-Term Potentiation</td>
<td>LEARN</td>
<td>Reinforce edges on successful paths</td>
</tr>
<tr>
<td>7</td>
<td>Triadic closure</td>
<td>LEARN</td>
<td>If A→B→C succeeds twice, learn A→C</td>
</tr>
<tr>
<td>8</td>
<td>Hop caching + lateral spread</td>
<td>LEARN</td>
<td>Intermediate nodes cache the destination; the new edge is also propagated to the source's geographic neighbors</td>
</tr>
<tr>
<td>9</td>
<td>Incoming promotion</td>
<td>LEARN</td>
<td>Peers that contact me often become outbound synapses</td>
</tr>
<tr>
<td>10</td>
<td>Vitality-based eviction</td>
<td>FORGET</td>
<td>Drop the least-vital synapse when capacity is reached</td>
</tr>
<tr>
<td>11</td>
<td>Temperature annealing</td>
<td>EXPLORE</td>
<td>Cool exploration rate over time; reheat on dead-peer discovery</td>
</tr>
<tr>
<td>12</td>
<td>Epsilon-greedy first hop</td>
<td>EXPLORE</td>
<td>Small probability of random first hop avoids local minima</td>
</tr>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="structure--bootstrap-and-deployment-realism">STRUCTURE — bootstrap and deployment realism</h2>
<p><strong>Stratified bootstrap.</strong> Each new node is seeded with peers covering all XOR strata uniformly. Without this, the cold-start synaptome is dominated by lucky neighbors — local hops form, long hops don't.</p>
<p><strong>Mixed-capacity deployment (&quot;highway %&quot;).</strong> Real P2P networks are heterogeneous: most peers are browsers (WebRTC ~100 connections), some are server-class (effectively unlimited).</p>
<p>A configurable <code>highwayPct</code> fraction of nodes is promoted to <strong>server-class</strong>: they accept unlimited inbound, hold a synaptome of up to 256, and act as transit hubs. The rest stay browser-class with the standard 50-synapse cap.</p>
<br />
<p><span class="muted">The deployment-realism implications — including the cheapest highway% that captures most of the available improvement — are quantified later in the <em>Highway %</em> section.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="navigate--action-potential-routing">NAVIGATE — Action Potential routing</h2>
<p>Each hop, score every candidate by a learned function:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>AP(syn, target) = progress(syn, target) × syn.weight × ½^(latency_ms / 100)
</code></pre>
<ul>
<li><strong>progress</strong> = XOR distance reduction toward target</li>
<li><strong>weight</strong> = LTP-reinforced [0, 1]</li>
<li><strong>latency penalty</strong> = exponential — fast peers preferred at all distances</li>
</ul>
<br />
<p><strong>Two-hop lookahead.</strong> When no first-hop is decisively best, probe for the best second-hop candidates and pick the path with the highest combined score.</p>
<p><strong>Iterative fallback.</strong> If AP returns no candidate (every neighbor is &quot;wrong direction&quot;), fall back to k-closest-from-synaptome and retry. This rescues lookups that would otherwise stall in dead corridors.</p>
<p><span class="callout">AP routing is <em>not</em> greedy XOR with weights bolted on. The latency penalty makes nearby fast peers preferred over slightly-better-XOR distant ones — this is what makes the protocol <em>latency-aware</em> rather than purely <em>distance-aware</em>.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="learn--four-reinforcement-mechanisms">LEARN — four reinforcement mechanisms</h2>
<p><strong>LTP (Long-Term Potentiation).</strong> When a lookup succeeds, every synapse on the successful path gets a weight bump and an inertia lock. Locked synapses cannot be evicted.</p>
<p><strong>Triadic closure.</strong> When a node X observes peer A repeatedly routing through it to peer C, X introduces A directly to C. A gains a new synapse to C; X is no longer needed as middleman on future A → C lookups. The name comes from social-network theory: the open triangle A — X — C is <em>closed</em> into a direct A — C edge.</p>
<p><strong>Hop caching + lateral spread.</strong> Each intermediate node on a successful lookup adds the <em>destination</em> to its synaptome — and the new edge is also propagated laterally to the source's geographic neighbors. The path becomes shorter on the next lookup to the same region; nearby peers see the shortcut on their <em>first</em> lookup, not just after they generate one themselves.</p>
<p><strong>Incoming promotion.</strong> When a peer reaches out to me repeatedly via incoming synapses, I promote it to a real outbound synapse — passive learning of who's interested in me.</p>
<p><span class="callout">Together these four mechanisms turn <em>every successful lookup</em> into structural learning: shorter paths, new direct edges, promoted incoming peers. The routing table is rewritten by the traffic flowing through it — not by a separate maintenance pass.</span></p>

</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="forget--the-unified-admission-gate">FORGET — the unified admission gate</h2>
<p><code>_addByVitality(node, newSyn)</code> is called for <em>every</em> synapse addition: bootstrap, LTP, triadic, promotion, hop caching, annealing.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>1. If synaptome has room → add.
2. Otherwise, find the lowest-vitality non-locked synapse.
3. If new synapse's vitality &gt; victim's → swap.
4. Else → refuse silently.
</code></pre>
<br />
<p>This single function replaces:</p>
<ul>
<li>NX-17's stratified eviction</li>
<li>NX-17's two-tier (synaptome + highway) management</li>
<li>NX-17's stratum floors</li>
<li>NX-17's synaptome floors</li>
<li>NX-17's adaptive decay parameters</li>
</ul>
<br />
<p><span class="callout">Continuous decay (γ = 0.995/tick) erodes weight uniformly. Under-used synapses lose vitality and become eligible for replacement; well-used ones stay locked.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="explore--temperature-and-epsilon">EXPLORE — temperature and epsilon</h2>
<p><strong>Temperature annealing.</strong> Each node carries a temperature <code>T ∈ [T_min, T_init]</code>. Cool by <code>T *= 0.9997</code> each lookup. Higher T → more probabilistic synapse selection (Boltzmann-style); lower T → greedy AP scoring.</p>
<p><strong>Reheat on dead-peer discovery.</strong> When routing finds a dead peer, spike <code>T = max(T, 0.5)</code>. Accelerates exploration to repair damage.</p>
<p><strong>Epsilon-greedy first hop.</strong> With probability ε = 0.05, replace the first AP-selected hop with a random synaptome member. Cheap insurance against early lock-in to a suboptimal corridor.</p>
<br />
<p><span class="muted">Both exploration mechanisms are biased toward learning rather than fully random — the floor is uniform sampling over the <em>current synaptome</em>, not over the network.</span></p>
<p><span class="callout">Exploration is bounded <em>and</em> targeted. Epsilon-greedy at the first hop costs at most one detour per lookup; annealing replaces only the lowest-vitality synapse. Neither mechanism risks the routing structure that LTP has already proven valuable.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-pubsub-on-a-dht-must-do">What pub/sub on a DHT must do</h2>
<p>Five requirements — the rest of this section is the answer to each.</p>
<table>
<thead>
<tr>
<th style="text-align:right">#</th>
<th>Requirement</th>
<th>Why hard on a DHT</th>
<th>NH-1's answer</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:right">1</td>
<td><strong>Reliable delivery</strong> at steady state</td>
<td>A naïve broadcast = N independent lookups → O(N²) cost</td>
<td>Routed axonal tree, fan-out via direct sends</td>
</tr>
<tr>
<td style="text-align:right">2</td>
<td><strong>Churn resilience</strong></td>
<td>K-closest sets drift; publisher/subscriber views diverge</td>
<td>Routed re-subscribe; tree heals on every refresh</td>
</tr>
<tr>
<td style="text-align:right">3</td>
<td><strong>Deterministic routing</strong></td>
<td>Subscriber &amp; publisher must agree on the same root without negotiation</td>
<td>Publisher-prefix topic ID — both derive it offline</td>
</tr>
<tr>
<td style="text-align:right">4</td>
<td><strong>ID stability</strong></td>
<td>Topic identity can't change as the membership churns</td>
<td><code>topicId = publisher.cellPrefix(8b) ‖ hash₅₆(name)</code> — fixed at publisher's S2 cell</td>
</tr>
<tr>
<td style="text-align:right">5</td>
<td><strong>Recovery from missed messages</strong></td>
<td>Subscribers reconnecting want history, not just future messages</td>
<td>Bounded replay cache at every relay; replay piggy-backs on subscribe</td>
</tr>
</tbody>
</table>
<p><span class="callout">The NH-1 pub/sub stack is a direct, point-by-point response to these five constraints. The next four slides show the mechanism for each.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="how-we-got-here--the-k-closest-%E2%86%92-axonal-tree-journey">How we got here — the K-closest → Axonal tree journey</h2>
<p><strong>The current pub/sub architecture is the fourth attempt.</strong> Each earlier attempt fixed a real failure mode and introduced a new one. The design that follows is what was left when we stopped adding parts.</p>
<br />
<p><strong>The three failed approaches</strong></p>
<ul>
<li><strong>NX-15 — K-closest replication.</strong> Subscribe stores at each of K=5 nodes closest to <code>hash(topic)</code>; publish hits any one. Worked at zero churn. Failed under load: publisher and subscribers compute K-closest from <em>different positions</em> in the network, and their top-K sets drift apart under churn. Delivery collapsed to ~38 % at 25 % churn — a coordination bug, not a routing bug.</li>
<li><strong>NX-16 — masked-distance fix.</strong> Tried to decouple K-closest selection from synaptome expansion by masking the top 8 ID bits in the distance metric. Routing collapsed to ~40 % delivery <em>even at zero churn</em>. <strong>Lesson, archived as a cautionary example: the distance metric used to select candidates must match the gradient used to expand them.</strong></li>
<li><strong>NX-15-style replication, generally.</strong> Replication on top of routing tries to <em>paper over</em> coordination drift. The next generation removed replication entirely and let routing carry the membership.</li>
</ul>
<br />
<p><strong>The four NX-17 fixes that work</strong> (and that NH-1 inherits)</p>
<ol>
<li><strong>Publisher-prefix topic IDs</strong> — <code>topicId = publisher.cellPrefix(8b) ‖ hash₅₆(name)</code>. Publisher and subscribers derive the same root deterministically. No negotiation, no drift.</li>
<li><strong>Terminal globality check</strong> — when greedy routing thinks it has reached the topic, do one <code>findKClosest(topicId, 1)</code> to confirm no globally-closer peer exists. Without this, two subscribers can elect different roots.</li>
<li><strong>External-peer batch adoption on overflow</strong> — when an axon hits its capacity, pick a <em>synaptome peer</em> (not an existing child) as the new sub-axon and ship the appropriate subscribers in one batch. Two invariants prevent runaway recursion.</li>
<li><strong>All-axon periodic re-subscribe</strong> — every role re-issues its subscribe on a 10 s interval. The re-subscribe <em>is</em> the liveness check — no separate ping, no parent tracking.</li>
</ol>
<p><span class="callout"><strong>The pattern.</strong> Three approaches that each papered over a coordination problem at the application layer. One approach that pushed coordination back into the routing layer where the DHT could actually do the work. That's the architecture the next slides describe.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="pubsub-on-top--axonal-trees">Pub/sub on top — axonal trees</h2>
<p><strong>Why the name?</strong> In a biological neuron, the <strong>axon</strong> is the <em>output</em> projection — a single fibre that branches, branches again, and finally synapses onto many downstream targets. Information flows <em>outward</em> from one source to many recipients along this branching tree. That is exactly the shape of a healthy publisher-to-subscribers fan-out.</p>
<p><strong>The analogy is structural, not poetic.</strong> A pub/sub topic in NH-1 is rooted at one node (the topic's &quot;soma&quot;). Direct subscribers attach to the root; when the root has too many children, it delegates a sub-axon (a &quot;branch&quot;) that takes over a subset of the subscribers. The tree grows toward the population that wants the topic — just as a real axon grows toward its targets during development.</p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="axonal-trees--how-they-work">Axonal trees — how they work</h2>
<p><strong>Topic identity (deterministic).</strong> <code>topicId = publisher.cellPrefix(8b) ‖ hash₅₆(event_name)</code>. Both publisher and every subscriber derive the same 64-bit ID with no negotiation. The tree's root pins into the publisher's S2 cell — naturally close to its audience.</p>
<p><strong>Subscribe is a routed message</strong> toward <code>topicId</code>. The first live axon role encountered on the path <em>intercepts</em> and adds the new subscriber to its children. If the walk completes with no axon found, the terminal node opens a new role and becomes the <strong>root</strong>. Every subscribe message also carries the subscriber's <code>lastSeenTs</code> and triggers a replay (covered on the next slide).</p>
<p><strong>Publish</strong> goes through the same route to <code>topicId</code>, lands at the root, and then <strong>fans out</strong>: the root sends to its direct children; each axon sub-role recursively forwards to its own children. One DHT lookup, then pure tree forwarding.</p>
<p><strong>Branching on overflow (batch adoption).</strong> When an axon's direct-child count exceeds <code>maxDirectSubs</code>, it picks an existing peer in its synaptome as a new sub-axon, partitions its current children by XOR proximity to that new sub-axon, and hands off the relevant batch in one <code>ADOPT_SUBSCRIBERS</code> message. The tree branches in O(1) DHT operations.</p>
<p><strong>Self-healing via re-subscribe.</strong> Every role re-issues its subscribe on a 10-second refresh interval. The walk lands on whichever live axon is closest to <code>topicId</code> <em>now</em>. Parent died? The re-subscribe attaches to a different live ancestor. Tree got reorganized? Invisible to the subscriber. The re-subscribe <strong>is</strong> the liveness check — there is no separate ping.</p>
<br />
<p><span class="callout">100 % delivery baseline; <strong>100 % recovered delivery</strong> under 5 % churn at 25 K nodes.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="temporal-pubsub--subscribe-is-a-request-for-history">Temporal pub/sub — subscribe is a request for <em>history</em></h2>
<p>A subscribe is not just &quot;send me future messages on this topic&quot;. It is <strong>&quot;send me every message I haven't already seen&quot;</strong>. Each subscribe carries a <code>lastSeenTs</code> — the highest publish timestamp this subscriber has observed.</p>
<p><strong>Every relay node keeps a bounded ring buffer.</strong> When an axon role receives a publish, it records <code>{ json, publishId, publishTs }</code> in a local cache (capacity ≈ 100 messages — tunable per topic).</p>
<p><strong>On subscribe arrival, the relay filters its cache to <code>publishTs &gt; lastSeenTs</code> and replays the missed messages as a single batched message</strong> before forwarding the subscribe upstream.</p>
<br />
<p><strong>Why this matters under churn:</strong></p>
<p>The decentralized axon tree means every re-publish node — not just the publisher — holds a copy of recent history. If a parent dies and a subscriber's re-subscribe lands on a different live relay, that new relay can fill the gap from <em>its own</em> cache. <strong>Healing and replay are the same mechanism.</strong> No central log, no separate recovery remote-procedure call (<strong>RPC</strong>), no &quot;catch-up&quot; protocol.</p>
<br />
<p><span class="callout">A subscribe message in NH-1 is simultaneously a liveness probe, a tree-attach request, and a request for missed history. Three jobs, one envelope — that's the axonal healing model.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="end-to-end-tick">End-to-end tick</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>on lookup(target):
  hop = 0
  while hop &lt; MAX_HOPS:
    candidates = synaptome ∪ incomingSynapses
    next       = AP_score(candidates, target)
    if next == null: next = iterative_fallback(target)
    if hop == 0 and rand() &lt; ε: next = random(synaptome)

    record_transit(prev, next)         // LEARN: triadic
    promote_incoming_if_warranted()    // LEARN: incoming
    hop_cache_destination()            // LEARN: hop caching
    anneal_replace_lowest_vitality()   // EXPLORE
    hop++

on success: reinforce_path()           // LEARN: LTP
periodically: decay_all_weights()      // FORGET
</code></pre>
<p>Every operation cost is bounded: O(synaptome.size). At 50 synapses the per-hop compute is ~0.2 ms — small relative to the 10 ms transit cost.</p>
<p><span class="callout">A complete NH-1 hop fits in this pseudocode. Five operations interleave on every lookup; learning is a side-effect of routing, not a separate phase.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="methodology">Methodology</h2>
<ul>
<li><strong>500 lookups per test cell.</strong> Global, regional radii (500 / 1k / 2k / 5k km), pub/sub</li>
<li><strong>Same node geometry</strong> across all four protocols — direct comparison, not three independent builds</li>
<li><strong>Bootstrap init</strong> for production realism: sponsor-chain join + warmup. Omniscient init shown separately as a theoretical ceiling.</li>
<li><strong>Churn</strong> induced discretely (instantaneous kill) and continuously (1 % every 5 ticks)</li>
<li><strong>Connection cap</strong> 100 (browser-class, web-limited model)</li>
</ul>
<br />
<p><span class="callout"><strong>Data provenance.</strong> The 4-way comparison and Highway% / Slice World tables come from 25 K-node CSVs captured at simulator v0.67–v0.68. The 3δ floor analysis later in the deck is from fresh v0.69.00 sweeps at 5 K / 25 K / 50 K. Each table self-discloses its source; the footer reflects the most recent simulator version.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-training-does--and-doesnt-do">What training does — and doesn't do</h2>
<p>A non-obvious result from running every NX variant under two starting conditions:</p>
<ul>
<li><strong>Omniscient init</strong> — every node seeded with its theoretically optimal K-closest neighbors</li>
<li><strong>Bootstrap init</strong> — sponsor-chain join + 50 K warmup lookups (production realism)</li>
</ul>
<table>
<thead>
<tr>
<th>Protocol</th>
<th style="text-align:right">Omniscient hops</th>
<th style="text-align:right">Bootstrap-trained hops</th>
<th style="text-align:right">Gap</th>
<th style="text-align:right">Bootstrap success%</th>
</tr>

<td style="text-align:right"><strong>60 %</strong> <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/></td>
</tr>

<tr>

<td style="text-align:right">100 %</td>
</tr>
<tr>
<td><strong>NX-17</strong></td>
<td style="text-align:right"><strong>3.67</strong></td>
<td style="text-align:right"><strong>4.28</strong></td>

<br />
<p><strong>Three findings:</strong></p>
<ol>
<li><strong>A shared asymptote.</strong> Every NX from NX-6 onward lands in a tight 4.28 – 4.43 hop band under bootstrap+training, <em>regardless</em> of where it started. Training settles the synaptome to a <strong>traffic-driven asymptote</strong> near 4.3 hops, essentially independent of initial conditions.</li>
<li><strong>NX-17 has the smallest hop gap and fast bootstrap-trained latency.</strong> Bootstrap-trained NX-17 evaluates greedy candidates faster than its own omniscient configuration: pruned synaptomes are leaner. (Latency is left as hops × per-hop cost in this table — the 4-way comparison earlier in the deck reports the headline NX-17 latency at the 25 K, default-warmup configuration.)</li>
<li><strong>Training is compute-optimizing, not path-shortening.</strong> The 50-synapse cap is the binding constraint. Training redistributes weight on the edges sponsor-chains gave you at join — <em>it does not discover new shorter edges sponsor-chains missed</em>.</li>
</ol>
<p><span class="callout">The lever for production routing quality is the <strong>initial synaptome construction</strong>, not the training algorithm. Bootstrap-trained NX-17 hits a 4.3-hop asymptote at 100 % success — competitive with its own omniscient ceiling.</span></p>
<p><span class="muted">Numbers in this table are from a controlled multi-variant ablation (50 K warmup lookups). The 4-way comparison earlier in the deck reports NX-17 at default warmup conditions and is the canonical headline latency.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="four-way-comparison-at-25000-nodes">Four-way comparison at 25,000 nodes</h2>
<p><span class="muted">Web-limited (cap = 100), omniscient init, geoBits = 8, no highway promotion. Same node geometry across all four protocols. <strong>Canonical init</strong>: every protocol uses identical K-closest XOR-fill bootstrap so the routing/learning algorithm is measured in isolation from any per-protocol bootstrap strategy.</span></p>
<table>
<thead>
<tr>
<th>Test</th>
<th style="text-align:right">Kademlia</th>
<th style="text-align:right">G-DHT</th>
<th style="text-align:right">NX-17</th>
<th style="text-align:right"><strong>NH-1</strong></th>
</tr>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="how-fast-is-fast--the-3%CE%B4-floor">How fast is fast? — the 3δ floor</h2>
<p>Latency comparisons need an absolute reference, not just &quot;lower than Kademlia&quot;. <strong>Dabek, Li, Sit, Robertson, Kaashoek &amp; Morris</strong> (MIT — NSDI 2004, <em>Designing a DHT for low latency and high throughput</em>) proved that for <em>any</em> recursive O(log N) DHT, total lookup latency converges to a hard analytical floor:</p>
<br />
<p><strong>lookup ms ≈ δ + δ/2 + δ/4 + … = 3δ</strong></p>
<br />
<p>where <strong>δ</strong> is the median pairwise <em>one-way</em> internet latency. Each successive lookup hop covers a geometrically halving fraction of the remaining ID-space, so the second-to-last hop is half the cost of the last, the third-to-last a quarter, and so on. The series sums to 3δ regardless of N. Even an oracle that always picked the lowest-RTT finger could not do better.</p>
<p><strong>Measuring δ in our simulator.</strong> <strong>δ is a property of the network itself, not of any DHT</strong> — it depends only on (a) the population-weighted geographic placement of nodes and (b) our latency model <code>propagation = (haversine_km / 20015) × 150 ms + 10 ms</code> per one-way message. The same δ applies to Kademlia, G-DHT, every NX variant, and NH-1: none of them can route faster than 3δ.</p>
<p>At every benchmark sweep we sample <strong>10 000 random node pairs</strong> from the live population (independently of any protocol) and compute the one-way pairwise latency:</p>
<table>
<thead>
<tr>
<th style="text-align:right">N</th>
<th style="text-align:right">δ_median</th>
<th style="text-align:right">δ_p95</th>
<th style="text-align:right"><strong>3δ floor</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:right">5 K</td>
<td style="text-align:right">67.9 ms</td>
<td style="text-align:right">123.3 ms</td>
<td style="text-align:right"><strong>203.6 ms</strong></td>
</tr>
<tr>
<td style="text-align:right">25 K</td>
<td style="text-align:right">68.0 ms</td>
<td style="text-align:right">124.1 ms</td>
<td style="text-align:right"><strong>204.0 ms</strong></td>
</tr>
<tr>
<td style="text-align:right">50 K</td>
<td style="text-align:right">68.9 ms</td>
<td style="text-align:right">124.2 ms</td>
<td style="text-align:right"><strong>206.6 ms</strong></td>
</tr>
</tbody>
</table>
<p><span class="muted">δ is stable across N — population character doesn't change with sample size. Coincidentally identical to Dabek's measured King-dataset δ = 67 ms, so the simulator's geometric latency model lands on the same point as real-world Internet RTT. The next slide then measures every protocol against this single shared reference line.</span></p>
<p><span class="callout">Any honest claim about DHT latency should be expressed as a multiple of 3δ. &quot;Beats Kademlia&quot; is a relative win; <strong>&quot;close to 3δ&quot; is an absolute one.</strong></span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="n-dht-lives-at-the-floor">N-DHT lives at the floor</h2>
<p>Same global lookup test (500 random source/destination pairs). Each cell shows <strong>measured median ms (× the 3δ floor for that N)</strong>, so the reader sees both the absolute latency and how far above the theoretical lower bound it sits:</p>
<br />
<table>
<thead>
<tr>
<th style="text-align:right">N (3δ floor)</th>
<th style="text-align:right">Kademlia</th>
<th style="text-align:right">G-DHT</th>
<th style="text-align:right">NX-10</th>
<th style="text-align:right"><strong>NX-17</strong></th>
<th style="text-align:right">NH-1</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:right">5 K (204 ms)</td>
<td style="text-align:right">410 ms (2.01×)</td>
<td style="text-align:right">268 ms (1.32×)</td>
<td style="text-align:right">217 ms (1.07×)</td>
<td style="text-align:right"><strong>215 ms (1.06×)</strong></td>
<td style="text-align:right">240 ms (1.18×)</td>
</tr>
<tr>
<td style="text-align:right">25 K (204 ms)</td>
<td style="text-align:right">503 ms (2.46×)</td>
<td style="text-align:right">287 ms (1.41×)</td>
<td style="text-align:right">243 ms (1.19×)</td>
<td style="text-align:right"><strong>241 ms (1.18×)</strong></td>
<td style="text-align:right">254 ms (1.25×)</td>
</tr>
<tr>
<td style="text-align:right">50 K (207 ms)</td>
<td style="text-align:right">548 ms (2.65×)</td>
<td style="text-align:right">291 ms (1.41×)</td>
<td style="text-align:right">240 ms (1.16×)</td>
<td style="text-align:right"><strong>243 ms (1.18×)</strong></td>
<td style="text-align:right">264 ms (1.28×)</td>
</tr>
</tbody>
</table>
<br />
<ul>
<li><strong>N-DHT plateaus at ~1.18 × the floor</strong> between 25 K and 50 K. NX-17 sits at <strong>241 → 243 ms</strong> — only ~36 ms above the 3δ lower bound.</li>
<li><strong>Kademlia worsens with N</strong> (2.01× → 2.65×, <strong>410 → 548 ms</strong>) — its log N hop tax compounds.</li>
<li><strong>NH-1 trails NX-17 by ~10 %</strong> (<strong>~21 ms</strong> at 50 K) — a real but recoverable cost of the 12-parameter simplification vs NX-17's 44.</li>
</ul>
<br />
<p>The remaining 18 % at NX-17 has a clean structural explanation. NX-17 averages 4.5 hops where an oracle PNS-ideal lookup would take ~3. Each &quot;extra&quot; hop costs ~δ/2 ≈ 34 ms — exactly the geometric tail Dabek's series predicts.</p>
<p><span class="callout"><strong>Implication.</strong> Latency optimization within the O(log N) routing class is essentially complete. Further annealing / lookahead tweaks move 1.18× → maybe 1.10× at best — diminishing returns. The remaining R&amp;D axes are churn resilience, pub/sub fan-out, and constant-hop variants.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<h2 id="highway--deployment-realistic-knee">Highway %: deployment-realistic knee</h2>
<p><strong>What this slide measures.</strong> Real P2P networks are heterogeneous: most participants run inside a browser (~50–100 connections, the WebRTC ceiling), but some run on real servers with effectively unlimited inbound capacity. We sweep the <em>fraction</em> of server-class nodes from 0 → 100 % and measure NH-1 latency at each point.</p>
<p><strong>What &quot;highway&quot; means.</strong> A <strong>highway node</strong> is a server-class peer: <code>maxConnections = ∞</code>, synaptome cap raised from 50 to 256. It accepts unlimited inbound and acts as a transit hub. The rest of the network stays browser-class.</p>
<p><strong>Highway promotion within the simulator is random</strong> — no privileged coordinator picks them. In a real deployment, highway status is <em>self-determined</em>: a peer running as a node application on a PC or a server identifies itself as one based on its actual capacity. The protocol treats highway and browser nodes identically apart from their cap.</p>
<p><strong>What the &quot;knee&quot; means.</strong> The point on the curve where additional server-class capacity stops paying off — adding more highway nodes beyond the knee yields rapidly diminishing latency improvement. It is the cheapest deployment that captures most of the available benefit.</p>

<h2 id="slice-world--recovery-from-a-network-partition">Slice World — recovery from a network partition</h2>
<p>The Slice World test partitions the network into Eastern and Western hemispheres connected through <strong>a single bridge node</strong> (placed near Hawaii). Every cross-hemisphere edge except those incident on the bridge is removed.</p>
<p><strong>The question it asks</strong> is not <em>&quot;can you find the bridge once?&quot;</em> — it is <em>&quot;given <strong>one</strong> intact connection across a severed network, can the protocol leverage that single hole in the dike into a flood of restored connectivity?&quot;</em></p>
<table>
<thead>
<tr>
<th>Protocol</th>

<td>Kademlia</td>

<td style="text-align:right">—</td>
<td>Cannot reach the bridge. The partition is permanent — the network is now two networks.</td>
</tr>
<tr>
<td>G-DHT</td>
<td style="text-align:right"><strong>4.6 %</strong> <img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/></td>
<td style="text-align:right">9.5 / 525</td>

<td style="text-align:right"><strong>94.8 %</strong></td>
<td style="text-align:right">7.3 / 423</td>

<p><span class="callout">A partition like this is what a real outage looks like — a submarine cable fault, an ISP-level filter, a regulatory split. The test measures whether the protocol can <strong>heal</strong> from it.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="slice-world--visualized">Slice World — visualized</h2>

<p>The simulator after Slice World setup at 5 K nodes.</p>
<p><strong>Yellow</strong> = Western hemisphere<br />
<strong>White</strong> = Eastern hemisphere<br />
<strong>Green</strong> = at least one non-bridge cross-hem peer</p>
<br />
<p>At setup only <strong>Hawaii</strong> is green — it is the sole bridge between the partitioned halves.</p>
<p>With <strong>Kademlia</strong>, that picture stays frozen during training: no learning, no recovery.</p>
<p>With <strong>NX-17</strong> or <strong>NH-1</strong>, green spreads outward as hop caching, triadic closure, and lateral spread deposit new cross-hem synapses on every successful path through the bridge.</p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="slice-world--the-bridge-as-a-seed-crystal">Slice World — the bridge as a seed crystal</h2>
<p>A diagnostic run shows the recovery happening directly. Starting from a freshly partitioned 5 K network — <strong>zero cross-hemisphere synapses, partition honest</strong> — and running just 10 lookups:</p>
<table>
<thead>
<tr>
<th></th>
<th style="text-align:right">value</th>
</tr>
</thead>
<tbody>
<tr>
<td>Cross-hem synapses <strong>before</strong></td>
<td style="text-align:right">0</td>
</tr>
<tr>
<td>Cross-hem synapses <strong>after 10 lookups</strong></td>
<td style="text-align:right"><strong>20</strong></td>
</tr>
<tr>
<td>Lookups that succeeded</td>
<td style="text-align:right">7 / 10</td>
</tr>
<tr>
<td>Avg new cross-hem synapses per success</td>
<td style="text-align:right">~3</td>
</tr>
</tbody>
</table>
<p><strong>Each successful bridge crossing seeds new connectivity.</strong> When a path goes <code>west-source → … → bridge → … → east-target</code>, NH-1's learning rules fire on every node along the way:</p>
<ul>
<li><strong><code>_hopCache</code></strong> — every intermediate node adds the <em>destination</em> to its synaptome (a fresh cross-hem edge for every west node on the path)</li>
<li><strong><code>_recordTransit</code></strong> — observed <code>(prev → next)</code> pairs become triadic-closure candidates</li>
<li><strong><code>lateralSpread</code></strong> — propagates the new synapse to the source's geographic neighbors</li>
</ul>
<p><strong>By 500 lookups, the partition has effectively dissolved.</strong> Hundreds of cross-hem synapses now exist; only the earliest lookups depended exclusively on the bridge. The 95 % aggregate success rate is the <em>integral</em> of recovery, not a snapshot of bridge-finding.</p>
<p><span class="callout"><strong>This is what the test was designed to measure.</strong> Single-shot bridge-finding is the opening move; learning-driven re-stitching is the play. NH-1 doesn't route through the partition — it <em>dissolves</em> it.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="pubsub-under-sustained-churn--graceful-degradation-no-cliff">Pub/sub under sustained churn — graceful degradation, no cliff</h2>
<p>A continuous live-simulation: 25 K nodes, 79 groups × 32 subscribers, <strong>1 % of alive non-publisher nodes killed every 5 ticks</strong>, three refresh passes between kills. Cumulative churn measured as fraction of original network replaced.</p>
<table>
<thead>
<tr>
<th style="text-align:right">Cumulative churn</th>
<th style="text-align:right">Delivered %</th>
<th style="text-align:right">K-overlap</th>
<th style="text-align:right">Axon roles</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:right">0 %</td>
<td style="text-align:right"><strong>100.0 %</strong></td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">537</td>
</tr>
<tr>
<td style="text-align:right">5 %</td>
<td style="text-align:right">98.7 %</td>
<td style="text-align:right">—</td>
<td style="text-align:right">1,541</td>
</tr>
<tr>
<td style="text-align:right">10 %</td>
<td style="text-align:right">91.2 %</td>
<td style="text-align:right">81 %</td>
<td style="text-align:right">1,787</td>
</tr>
<tr>
<td style="text-align:right">15 %</td>
<td style="text-align:right">88.7 %</td>
<td style="text-align:right">77 %</td>
<td style="text-align:right">1,989</td>
</tr>
<tr>
<td style="text-align:right">20 %</td>
<td style="text-align:right">86.5 %</td>
<td style="text-align:right">62 %</td>
<td style="text-align:right">2,116</td>
</tr>
<tr>
<td style="text-align:right">25 %</td>
<td style="text-align:right">70.0 %</td>
<td style="text-align:right">54 %</td>
<td style="text-align:right">2,169</td>
</tr>
<tr>
<td style="text-align:right">30 %</td>
<td style="text-align:right">52.4 %</td>
<td style="text-align:right">47 %</td>
<td style="text-align:right">2,189</td>
</tr>
<tr>
<td style="text-align:right">34 %</td>
<td style="text-align:right">50.8 %</td>
<td style="text-align:right">42 %</td>
<td style="text-align:right">2,197</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Three observations:</strong></p>
<ol>
<li><strong>No cliff.</strong> Delivery degrades smoothly with churn; there is no breakdown threshold. The system finds a steady state where new subscriber recruitment matches loss.</li>
<li><strong>K-overlap predicts delivery 1:1.</strong> The dominant residual failure isn't broken routing — it's subscribers temporarily captured at relay nodes that have lost their delivery path to the root. The replay cache (next slide <em>&quot;Temporal pub/sub&quot;</em>) was designed to close exactly this gap.</li>
<li><strong>Axon-role count grows with churn but plateaus.</strong> From 537 axons at 0 % churn to ~2,200 at 30 %, leveling off. The tree absorbs growth into deeper structure rather than unbounded fan-out.</li>
</ol>
<p><span class="callout"><strong>Through 20 % cumulative churn, NH-1 holds delivery above 86 % with no replication, no gossip, and no parent tracking.</strong> Above 25 % churn the protocol enters a recovery-paced regime where steady-state delivery is the equilibrium of recruitment vs. loss.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="honesty-locality-vs-latency">Honesty: locality vs. latency</h2>
<p><strong>N-DHT's priorities are speed and robustness</strong> — fast lookup, reliable delivery. Geographic location is <em>not a goal</em>; it is one input.</p>
<p><strong>What the simulator does.</strong> Every protocol's hop latency is computed from physical (haversine) distance between simulated nodes — a faithful Internet model. This is what the real Internet looks like to all four protocols.</p>
<p><strong>What the protocol does.</strong> A node knows <em>only its own</em> S2 cell — embedded once, at creation, into the top of its 64-bit ID:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>nodeId = S2 cell prefix (8 bits) ‖ H(publicKey)
</code></pre>
<p>The protocol cannot ask another node <em>&quot;where are you?&quot;</em> — there is no such message. The S2 prefix creates <strong>initial regional clustering at bootstrap</strong> because nearby nodes are XOR-close, so a node's K-bucket and synaptome are seeded with mostly-local peers. After that, locality is a derived property of the routes that LTP and vitality reinforce.</p>
<p><strong>Latency is used in routing</strong>, indirectly: AP scoring includes a <code>½^(latency_ms/100)</code> penalty, so observed round-trip time (<strong>RTT</strong>) influences hop selection. Fast peers win at every distance — that is the speed-first priority in action.</p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="the-geobits--0-ablation">The geoBits = 0 ablation</h2>
<p>When we strip the S2 prefix from <strong>NH-1</strong> and re-run, regional latency collapses:</p>
<table>
<thead>
<tr>
<th>Test</th>
<th style="text-align:right">NH-1 · geoBits = 8 (hops / ms)</th>
<th style="text-align:right">NH-1 · <strong>geoBits = 0</strong> (hops / ms)</th>
<th style="text-align:right">Δ ms</th>
</tr>
</thead>
<tbody>
<tr>
<td>Global</td>
<td style="text-align:right">5.09 / 263 ms</td>
<td style="text-align:right">5.94 / 453 ms</td>
<td style="text-align:right">+72 %</td>
</tr>
<tr>
<td>500 km</td>
<td style="text-align:right">3.31 / 96 ms</td>
<td style="text-align:right"><strong>6.01 / 444 ms</strong></td>
<td style="text-align:right"><strong>+363 %</strong></td>
</tr>
<tr>
<td>2000 km</td>
<td style="text-align:right">3.93 / 123 ms</td>
<td style="text-align:right">6.01 / 437 ms</td>
<td style="text-align:right">+255 %</td>
</tr>
<tr>
<td>5000 km</td>
<td style="text-align:right">4.54 / 169 ms¹</td>
<td style="text-align:right">5.96 / 433 ms</td>
<td style="text-align:right">+156 %</td>
</tr>
</tbody>
</table>
<p><span class="muted">All cells are NH-1 measurements at 25 K nodes, web-limited (cap = 100), hw = 0. The 4-way comparison covering all protocols at geoBits = 0 is on the next slide.</span></p>
<p><span class="muted">¹ The geoBits = 8 baseline at 5000 km is from the headline 4-way comparison run (which measured all five distance bands). The geoBits = 0 sweep run measured 5000 km natively; the geoBits = 8 run in the same sweep skipped 5000 km for time. Numbers are from comparable 25 K, hw = 0 conditions but distinct CSVs.</span></p>
<br />
<p>The latency penalty in AP routing is not strong enough, on its own, to discover locality from scratch within standard warmup (~5000 lookups). The S2 prefix is the <strong>bootstrap shortcut</strong>: it does not <em>teach</em> locality, it <em>seeds</em> the network with locality so reinforcement can sharpen routing within it.</p>
<br />
<p><span class="callout">Geography is an initial-condition shortcut for the latency optimization, not a goal in itself. Future work: an embedded RTT-coordinate system (Vivaldi-style) could replace the S2 seed with a learned one — see the comparison slide later in this deck.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="geobits--0--isolating-the-learning-advantage">geoBits = 0 — isolating the learning advantage</h2>
<p>If we strip the S2 prefix from <em>every</em> protocol simultaneously — and use <strong>canonical init</strong> so each protocol starts from the identical K-closest-XOR routing table — the comparative picture isolates exactly the routing/learning algorithm.</p>
<p><span class="muted">25 K nodes, web-limited (cap = 100), omniscient init, <strong>geoBits = 0</strong>, <strong>canonical init</strong>.</span></p>
<table>
<thead>
<tr>
<th>Protocol</th>
<th style="text-align:right">geoBits = 8 · Global ms (reference)</th>
<th style="text-align:right">geoBits = 0 · Global ms</th>
<th style="text-align:right">geoBits = 0 · 500 km</th>
<th style="text-align:right">geoBits = 0 · 2000 km</th>
<th>Notes</th>
</tr>
</thead>
<tbody>
<tr>
<td>Kademlia</td>
<td style="text-align:right">508</td>
<td style="text-align:right"><strong>506</strong></td>
<td style="text-align:right">511</td>
<td style="text-align:right">504</td>
<td>No locality either way — geoBits doesn't matter to pure XOR.</td>
</tr>
<tr>
<td>G-DHT</td>
<td style="text-align:right">284</td>
<td style="text-align:right"><strong>780</strong></td>
<td style="text-align:right">765</td>
<td style="text-align:right">781</td>
<td>Geo-prefix carries G-DHT entirely; without it, a <code>noProgressLimit = 3</code> overhead leaves it slower than K-DHT.</td>
</tr>
<tr>
<td><strong>NX-17</strong></td>
<td style="text-align:right">241</td>
<td style="text-align:right"><strong>376</strong></td>
<td style="text-align:right"><strong>341</strong></td>
<td style="text-align:right"><strong>355</strong></td>
<td>Loses locality but still beats Kademlia by <strong>26 %</strong> at geoBits = 0 — pure learning advantage.</td>
</tr>
<tr>
<td>NH-1</td>
<td style="text-align:right">269</td>
<td style="text-align:right">467</td>
<td style="text-align:right">418</td>
<td style="text-align:right">439</td>
<td>Beats Kademlia by <strong>8 %</strong> at geoBits = 0. Same learning chassis as NX-17, simpler — pays a measurable consolidation cost.</td>
</tr>
</tbody>
</table>
<p><span class="muted">The first column repeats each protocol's geoBits = 8 baseline so the <em>learning advantage</em> and <em>locality contribution</em> can be read off the same row. Headline finding is the third column (geoBits = 0 global).</span></p>
<br />
<p><strong>Three findings:</strong></p>
<ol>
<li><strong>NX-17 and NH-1 still beat Kademlia under identical bootstrap and no locality.</strong> This is the cleanest possible &quot;learning helps&quot; claim — every confound (bootstrap strategy, geographic prefix) controlled. NX-17 wins by 26 %, NH-1 by 8 %.</li>
<li><strong>G-DHT vs K-DHT exposes a non-bootstrap difference.</strong> Canonical init equalizes bootstrap; the residual 780-vs-506 gap comes from G-DHT's lookup-tuning choice (<code>noProgressLimit = 3</code>), tuned for geographic-routing escapes that don't exist at geoBits = 0. A real architectural finding the methodology surfaced.</li>
<li><strong>NH-1 vs NX-17 narrows but doesn't close.</strong> The 80/20 supplement helped NX-17 by ~7 ms at geoBits=8 (native vs canonical). At geoBits=0 the 376-vs-467 gap is roughly 24 % — it's NX-17's specialized rules, not its bootstrap, doing the work.</li>
</ol>
<p><span class="callout"><strong>The headline gap is real and measurable.</strong> NX-17 at 376 ms vs Kademlia at 506 ms, identical starting state, no locality, no geography — that is what the routing/learning algorithm contributes. Removing that distance from the deck would be hiding the actual claim.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
