<header>Neuromorphic DHT — NH-1</header>
<h2 id="init-mode-%C3%97-geobits--the-full-2-%C3%97-2">Init mode × geoBits — the full 2 × 2</h2>
<p><span class="muted"><em>Reference table — the full bootstrap × locality cross-product. The earlier geoBits=0 ablation slide carries the headline finding; this slide is for readers who want to verify the result holds across all four cells.</em></span></p>
<p>Global lookup latency in milliseconds. <strong>Canonical</strong> = every protocol starts from K-closest-XOR (identical state). <strong>Native</strong> = each protocol's own bootstrap strategy (Kademlia: pure XOR; G-DHT: 50/50 stratified+random; NX-17: 80/20; NH-1: pure XOR).</p>
<p><span class="muted">25 K nodes, web-limited (cap = 100), omniscient init, hw = 0.</span></p>
<table>
<thead>
<tr>
<th></th>
<th style="text-align:right">Kademlia</th>
<th style="text-align:right">G-DHT</th>
<th style="text-align:right">NX-17</th>
<th style="text-align:right">NH-1</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>geoBits = 8 · native</strong></td>
<td style="text-align:right">488</td>
<td style="text-align:right">289</td>
<td style="text-align:right"><strong>234</strong></td>
<td style="text-align:right">254</td>
</tr>
<tr>
<td><strong>geoBits = 8 · canonical</strong></td>
<td style="text-align:right">508</td>
<td style="text-align:right">284</td>
<td style="text-align:right">241</td>
<td style="text-align:right">269</td>
</tr>
<tr>
<td><strong>geoBits = 0 · native</strong></td>
<td style="text-align:right">493</td>
<td style="text-align:right">769</td>
<td style="text-align:right">377</td>
<td style="text-align:right">461</td>
</tr>
<tr>
<td><strong>geoBits = 0 · canonical</strong></td>
<td style="text-align:right">506</td>
<td style="text-align:right">780</td>
<td style="text-align:right"><strong>376</strong></td>
<td style="text-align:right">467</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Three things this 2 × 2 makes visible:</strong></p>
<ul>
<li><strong>Bootstrap matters less than people often assume.</strong> Native vs canonical at geoBits = 8 swings each protocol by under 8 %. The architectural choices are real but small relative to other effects.</li>
<li><strong>The geographic prefix matters a lot — for everyone.</strong> Geo = 8 to geo = 0 doubles K-DHT-equivalent latency. The S2 prefix is doing real work in every column. Removing it forces every protocol to route under genuinely random IDs.</li>
<li><strong>Learning matters most under stress.</strong> At geoBits = 0 / canonical (the hardest condition for routing), NX-17 is 26 % faster than Kademlia and NH-1 is 8 % faster. Under easier conditions (geoBits = 8) the gap widens further. <strong>The advantage scales with how much there is to learn.</strong></li>
</ul>
<p><span class="callout">Canonical-init isolates the routing/learning algorithm. Native-init measures the protocol as deployed. Both are real; both belong in the record. The deck headlines canonical because it's the cleaner architectural claim.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="n-1-%E2%86%92-nh-1--three-phases-of-research">N-1 → NH-1 — three phases of research</h2>
<table>
<thead>
<tr>
<th>Phase</th>
<th>Generation</th>
<th>Contribution</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Exploration</strong></td>
<td>N-1</td>
<td>First neuromorphic DHT — Hebbian synapse weighting, action-potential routing, two-hop lookahead</td>
</tr>
<tr>
<td></td>
<td>N-15W</td>
<td>Renewal-Based Highway Protection — last protocol of the original lineage before the restart</td>
</tr>
<tr>
<td><strong>Focused iteration</strong></td>
<td>NX-1</td>
<td>Clean, configurable restart of the architecture from a fresh base</td>
</tr>
<tr>
<td></td>
<td>NX-4</td>
<td><strong>Watershed</strong>: iterative fallback — every protocol below fails under stress, every protocol at or above succeeds</td>
</tr>
<tr>
<td></td>
<td>NX-6</td>
<td>Churn-resilience baseline: dead-synapse eviction, temperature reheat, adaptive decay</td>
</tr>
<tr>
<td></td>
<td>NX-10</td>
<td>Routing-topology forwarding tree — the first stable axonal-style pub/sub</td>
</tr>
<tr>
<td></td>
<td>NX-11</td>
<td>Diversified bootstrap — the 80 / 20 stratified + random allocation that NX-17 inherits</td>
</tr>
<tr>
<td></td>
<td>NX-15</td>
<td><code>AxonManager</code> generic membership protocol with K-closest replication</td>
</tr>
<tr>
<td></td>
<td>NX-17</td>
<td>Publisher-prefix topic IDs + pure routed axonal tree (no replication, no gossip)</td>
</tr>
<tr>
<td><strong>Consolidation</strong></td>
<td><strong>NH-1</strong></td>
<td>Vitality-driven unified admission gate — consolidates 18 specialized rules into 12; ~270 lines vs NX-17's ~2300</td>
</tr>
</tbody>
</table>
<br />
<p><span class="callout"><strong>NX-16: a cautionary dead end.</strong> NX-16 attempted to decouple <code>findKClosest</code>'s target cell from the node-ID prefix by masking the top 8 bits in the distance metric. Routing collapsed: publisher and subscribers found <em>different</em> &quot;closest&quot; nodes for the same topic; delivery dropped to ~40 % even at zero churn. The lesson: <strong>the distance metric used to select candidates must match the gradient used to expand them.</strong> Archived, not deleted — design failures earn their place in the record.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<h2 id="nx-17-rules-and-their-nh-1-disposition">NX-17 rules and their NH-1 disposition</h2>
<p><span class="muted"><em>Reference table — the full audit trail of which NX-17 rules survived consolidation and which were dropped. Skip on a first read; consult when you want to know what specifically changed.</em></span></p>
<table>
<thead>
<tr>
<th>NX-17 rule</th>
<th>What it does</th>
<th>NH-1 status</th>
</tr>
</thead>
<tbody>
<tr>
<td>Stratified bootstrap</td>
<td>Cold-start coverage across XOR strata</td>
<td><strong>Kept</strong> (STRUCTURE)</td>
</tr>
<tr>
<td>Diversified bootstrap (80/20)</td>
<td>20 % random peers for global reach</td>
<td><strong>Kept</strong> (merged into bootstrap)</td>
</tr>
<tr>
<td>Two-tier synaptome (50 + highway)</td>
<td>Separate &quot;permanent&quot; + &quot;candidate&quot; tiers</td>
<td><strong>Replaced</strong> by per-node <code>_maxSynaptome</code></td>
</tr>
<tr>
<td>Stratified eviction</td>
<td>Evict from over-represented stratum</td>
<td><strong>Replaced</strong> by vitality eviction</td>
</tr>
<tr>
<td>Stratum floors</td>
<td>Guarantee min peers per stratum</td>
<td><strong>Removed</strong> — vitality + diversity penalty handles it</td>
</tr>
<tr>
<td>Synaptome floor</td>
<td>Refuse eviction below N peers</td>
<td><strong>Removed</strong> — vitality preserves locked entries</td>
</tr>
<tr>
<td>AP routing</td>
<td>Learned-weight greedy walk</td>
<td><strong>Kept</strong> (NAVIGATE)</td>
</tr>
<tr>
<td>Two-hop lookahead</td>
<td>Probe second-hop alternatives</td>
<td><strong>Kept</strong> (NAVIGATE)</td>
</tr>
<tr>
<td>Epsilon-greedy first hop</td>
<td>Random first hop with prob ε</td>
<td><strong>Kept</strong> (EXPLORE)</td>
</tr>
<tr>
<td>Iterative fallback</td>
<td>k-closest fallback when AP fails</td>
<td><strong>Kept</strong> (NAVIGATE)</td>
</tr>
<tr>
<td>LTP</td>
<td>Reinforce successful paths</td>
<td><strong>Kept</strong> (LEARN)</td>
</tr>
<tr>
<td>Hop caching + lateral spread</td>
<td>Cache destination on intermediates</td>
<td><strong>Kept</strong> (LEARN)</td>
</tr>
<tr>
<td>Triadic closure</td>
<td>Learn long edges from transit</td>
<td><strong>Kept</strong> (LEARN)</td>
</tr>
<tr>
<td>Incoming promotion</td>
<td>Promote popular incoming peers</td>
<td><strong>Kept</strong> (LEARN)</td>
</tr>
<tr>
<td>Adaptive decay</td>
<td>Per-node decay rate based on usage</td>
<td><strong>Default off</strong> — flat γ = 0.995 wins</td>
</tr>
<tr>
<td>Simulated annealing</td>
<td>Replace lowest-vitality with 2-hop sample</td>
<td><strong>Kept</strong> (EXPLORE)</td>
</tr>
<tr>
<td>Churn recovery (dead-syn eviction)</td>
<td>Drop dead peers on discovery</td>
<td><strong>Kept</strong> (FORGET)</td>
</tr>
<tr>
<td>Temperature reheat on death</td>
<td>Spike T after dead-peer discovery</td>
<td><strong>Kept</strong> (EXPLORE)</td>
</tr>
<tr>
<td>Diversity budget penalty</td>
<td>Penalise over-represented stratum groups</td>
<td><strong>Removed</strong> v0.65.06 (harmful)</td>
</tr>
<tr>
<td>weightScale parameter</td>
<td>Bias AP scoring toward LTP weight</td>
<td><strong>Removed</strong> v0.66.10 (no measurable effect)</td>
</tr>

</table>
<p><span class="muted">~18 rules + 5 retired parameters → 12 active rules in NH-1. Behavioral surface is the same; admission logic is unified.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="nh-1-vs-nx-17--and-why">NH-1 vs NX-17 — and why</h2>
<table>
<thead>
<tr>
<th>Test</th>
<th style="text-align:right">NX-17</th>
<th style="text-align:right"><strong>NH-1</strong></th>
<th style="text-align:right">Δ (NH-1 vs NX-17)</th>
</tr>
</thead>
<tbody>
<tr>
<td>Global</td>
<td style="text-align:right">4.40 hops / 242 ms</td>
<td style="text-align:right">5.15 hops / 263 ms</td>
<td style="text-align:right">+17 % hops, +9 % ms</td>
</tr>
<tr>
<td>500 km</td>
<td style="text-align:right">2.75 / 80 ms</td>
<td style="text-align:right">3.28 / 95 ms</td>
<td style="text-align:right">+19 % hops, +18 % ms</td>
</tr>
<tr>
<td>2000 km</td>
<td style="text-align:right">3.27 / 105 ms</td>
<td style="text-align:right">4.01 / 126 ms</td>
<td style="text-align:right">+23 % hops, +20 % ms</td>
</tr>
<tr>
<td>5000 km</td>
<td style="text-align:right">3.74 / 143 ms</td>
<td style="text-align:right">4.54 / 169 ms</td>
<td style="text-align:right">+21 % hops, +18 % ms</td>
</tr>
<tr>
<td>pubsubm delivered</td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">tie</td>
</tr>
<tr>
<td>pubsubm + 5 % churn (recovered)</td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">100 %</td>
<td style="text-align:right">tie</td>
</tr>
<tr>
<td>dead-children / orphans</td>
<td style="text-align:right">0 / 0</td>
<td style="text-align:right">0 / 0</td>
<td style="text-align:right">tie</td>
</tr>
</tbody>
</table>
<br />
<p>The residual gap reflects two things:</p>
<p><strong>1. NX-17's specialized eviction policies are tuned for the cap=100 case.</strong> Stratified eviction with stratum and synaptome floors <em>guarantees</em> a coverage profile that NH-1's vitality eviction approximates but doesn't pin. Under tight caps, that difference is measurable.</p>
<p><strong>2. NH-1 trades peak performance for simplicity.</strong> ~270 lines vs NX-17's ~2300; 12 parameters vs ~44. The point is not that NH-1 is <em>faster</em> — it's that NH-1 is <em>almost as fast</em> with one unified admission gate that's easier to reason about and easier to extend.</p>
<br />
<p><span class="callout">Highway% recovers the gap and more — at hw=15 % NH-1 is <strong>223 ms global</strong>, beating NX-17's all-browser 242 ms. The capped gap is the cost of consolidation. We accept it.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-coral-dsht">What is Coral DSHT?</h2>
<p><strong>Coral</strong> (Freedman, Freudenthal, Mazières — NSDI 2004) is a <strong>distributed sloppy hash table</strong> that powered Coral CDN — one of the earliest production decentralized content-distribution networks. Coral coined the term <em>DSHT</em> to distinguish itself from strict DHTs.</p>
<p><strong>Mechanism — hierarchical RTT clusters.</strong> Each node measures round-trip time to every other node it encounters and joins <strong>multiple nested clusters</strong> at increasing RTT thresholds (e.g. &lt; 20 ms, &lt; 60 ms, global). Each cluster runs its own internal DHT.</p>
<p><strong>Lookup is local-first.</strong> When a node queries a key, it first searches the tightest cluster it belongs to. If no result is found there, it expands outward to the next cluster, and so on. Most queries terminate in the local cluster — cross-cluster fan-out happens only when necessary.</p>
<p><strong>&quot;Sloppy&quot; semantics.</strong> The strict DHT promise — <em>one canonical XOR-closest node per key</em> — is deliberately relaxed. A key may be stored at <em>any</em> node in the lookup cluster, and queries return the <em>first</em> hit, not the canonical one. This is what makes Coral a CDN: the same content is replicated at many local nodes, and clients pull from the nearest available.</p>
<p><strong>Production deployments:</strong> Coral CDN (2004 – ~2015) — handled millions of cache requests per day at peak, served as a free CDN for academic and small-publisher sites.</p>
<p><span class="callout"><strong>For this project:</strong> Coral's hierarchical-cluster idea is <em>parallel</em> to NH-1's weighted-synaptome approach. Both achieve latency-aware routing; they make very different structural commitments to get there.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="coral-vs-n-dht">Coral vs N-DHT</h2>
<p>Both adapt to network latency. They make opposite structural choices.</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Coral DSHT</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Structure</strong></td>
<td>Multiple nested DHTs, one per RTT cluster</td>
<td>A single flat synaptome with weighted edges</td>
</tr>
<tr>
<td><strong>Locality discovery</strong></td>
<td>Active RTT measurement at join + cluster membership</td>
<td>Passive — observed traffic reinforces useful edges; S2 prefix seeds initial regional bias</td>
</tr>
<tr>
<td><strong>Storage semantics</strong></td>
<td><em>Sloppy</em> — multiple replicas per key, return-first-found</td>
<td><em>Strict</em> — one canonical XOR-closest node per key</td>
</tr>
<tr>
<td><strong>Lookup</strong></td>
<td>Local cluster first, escalate outward only if needed</td>
<td>Single greedy AP walk over weighted synaptome</td>
</tr>
<tr>
<td><strong>Adaptation</strong></td>
<td>Cluster boundaries are static thresholds; nodes move between clusters</td>
<td>Continuous: weights update on every successful path</td>
</tr>
<tr>
<td><strong>Designed for</strong></td>
<td>Read-heavy content distribution (CDN) — many readers, mostly-static content</td>
<td>Routing + pub/sub — dynamic membership, real-time delivery</td>
</tr>
<tr>
<td><strong>Pub/sub support</strong></td>
<td>Out of scope</td>
<td>First-class via axonal trees</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap:</strong> both reject the &quot;one fixed routing structure for all distances&quot; approach. Both treat geographic locality as a property to <em>exploit</em>, not just record.</p>
<p><strong>Where they differ:</strong> Coral <em>enforces</em> locality through the hierarchical cluster structure — every node <em>knows</em> what's near. N-DHT <em>learns</em> locality through usage — every node <em>discovers</em> what's near via routed traffic. Coral relaxes the DHT promise to be local-first; N-DHT preserves the strict DHT promise and learns shortcuts on top.</p>
<p><span class="callout">Coral's design choice was: &quot;give up the canonical mapping to win locality.&quot; NH-1's design choice was: &quot;keep the canonical mapping; make locality emerge from learning.&quot; Different engineering trade-offs against the same core problem.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="what-is-vivaldi">What is Vivaldi?</h2>
<p><strong>Vivaldi</strong> (Dabek, Cox, Kaashoek, Morris — SIGCOMM 2004) is a <strong>decentralized network coordinate system</strong>. Each node continuously adjusts a synthetic position vector — typically in 3-dimensional Euclidean space plus a small &quot;height&quot; component — so that the <em>Euclidean distance</em> between any two nodes' coordinates approximates the <em>measured round-trip time</em> between them.</p>
<p><strong>Mechanism.</strong> Each node starts at a random position. Whenever it exchanges traffic with a peer, it observes the actual RTT, then applies a small spring-force adjustment to its own coordinate — pulling toward or pushing away from that peer to better match observation. Confidence in each measurement weights the magnitude of the move. Over many such observations, the system converges to a stable configuration where pair-wise Euclidean distances ≈ pair-wise RTTs.</p>
<p><strong>What it accomplishes.</strong> Any node can <em>predict</em> RTT to any peer it has never directly measured, purely from coordinates. Routing layers (or applications) can then choose &quot;nearby&quot; peers without an active probe round — Vivaldi turns latency into a queryable global property of the network. The system is fully decentralized: no coordinator, no infrastructure, no synchronization.</p>
<p><strong>Production deployments:</strong> Coral CDN, Azureus / Vuze (BitTorrent), some content-addressable overlays. The most influential predecessor for <em>latency-aware</em> peer-to-peer design.</p>
<p><span class="callout"><strong>For this project:</strong> a Vivaldi-style coordinate system is a candidate for replacing NH-1's <em>structural</em> S2 prefix with a <em>learned</em> locality primitive. Future benchmarks may include a Vivaldi-style protocol for completeness — both as a comparison reference and as a forward-looking direction.</span></p>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="vivaldi-vs-n-dht">Vivaldi vs N-DHT</h2>
<p>Both are adaptive routing systems. They optimize different things.</p>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Vivaldi</th>
<th>N-DHT</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Mechanism</strong></td>
<td>Synthetic coordinates in N-D Euclidean space</td>
<td>Hebbian reinforcement on routing edges</td>
</tr>
<tr>
<td><strong>What's learned</strong></td>
<td>A position vector per node that predicts RTT to any peer</td>
<td>A weight per synapse, reinforced by traffic on successful paths</td>
</tr>
<tr>
<td><strong>Output</strong></td>
<td>RTT prediction (any pair)</td>
<td>A ranked list of next-hops (per lookup)</td>
</tr>
<tr>
<td><strong>Locality discovery</strong></td>
<td>Emergent from RTT measurements</td>
<td>Imposed via S2 cell ID prefix</td>
</tr>
<tr>
<td><strong>Convergence guarantee</strong></td>
<td>Yes — coordinate descent on RTT residuals</td>
<td>Empirical — depends on traffic mixing</td>
</tr>
<tr>
<td><strong>Layered separation</strong></td>
<td>Coordinate system is generic; any routing layer can use it</td>
<td>Routing and learning are integrated in a single protocol</td>
</tr>
<tr>
<td><strong>Pub/sub support</strong></td>
<td>Out of scope — Vivaldi is a primitive</td>
<td>First-class — axonal tree built on routed synaptome</td>
</tr>
</tbody>
</table>
<br />
<p><strong>Where they overlap:</strong> both treat the network as something to <em>measure and adapt to</em>, not a fixed topology to traverse.</p>
<p><strong>Where they differ:</strong> Vivaldi predicts RTT, then any routing layer uses those predictions. N-DHT learns <em>paths</em> via reinforcement on the routing layer itself — locality is built into the IDs, learning sharpens the path within that locality.</p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="example-message-protocol">Example Message Protocol</h2>
<p><span class="muted"><em>Reference slide — the wire-level protocol surface. Skim if you only care about results; consult when you want to know what NH-1 actually exchanges between peers.</em></span></p>
<p><strong>Two layers.</strong> The application sees exactly two messages — SEND and RECEIVE. Everything else is the lower-level p2p wire protocol that implements them.</p>
<br />
<p><strong>Application layer</strong> — what an application built on NH-1 actually calls:</p>
<table>
<thead>
<tr>
<th>Message</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>SEND</strong> (target, payload)</td>
<td>Deliver a message toward a target — node, key, or topic</td>
</tr>
<tr>
<td><strong>RECEIVE</strong> (handler)</td>
<td>Register to receive messages addressed here, or to a topic this node subscribes to</td>
</tr>
</tbody>
</table>
<br />
<p><strong>P2P wire layer</strong> — the messages NH-1 exchanges between peers to make SEND / RECEIVE work. Application code never constructs these directly.</p>
<table>
<thead>
<tr>
<th>Message</th>
<th>Purpose</th>
</tr>
</thead>
<tbody>
<tr>
<td>PING / PONG</td>
<td>Liveness</td>
</tr>
<tr>
<td>FIND_NODE</td>
<td>DHT lookup step</td>
</tr>
<tr>
<td>ROUTE</td>
<td>Routed message toward a key (subscribe, publish, generic SEND)</td>
</tr>
<tr>
<td>SUBSCRIBE / UNSUBSCRIBE</td>
<td>Pub/sub membership; carries <code>lastSeenTs</code> for replay</td>
</tr>
<tr>
<td>PUBLISH</td>
<td>Publish to topic</td>
</tr>
<tr>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="deployment-considerations">Deployment considerations</h2>
<ul>
<li><strong>Trust model.</strong> No central authority. Public-key signatures authenticate peers.</li>
<li><strong>Sybil resistance.</strong> S2 cell prefix lightly discourages sybil swarms per-cell — not a full defense. Proof-of-location or a proof-of-work (<strong>PoW</strong>) join hurdle recommended for open deployments.</li>
<li><strong>Provisioning.</strong> Bootstrap via a small published sponsor set; fully decentralized thereafter.</li>
<li><strong>Observability.</strong> Nodes export local stats (synaptome health, LTP rate, role counts) for operator overlays.</li>
</ul>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="pubsub-failure-modes-we-can-name">Pub/sub failure modes we can name</h2>
<p>Honest accounting of where the axonal tree shows seams:</p>
<ul>
<li><strong>Forwarder loss under churn.</strong> When a tree-internal node dies mid-publish, its subtree is briefly unreachable until each member's next refresh. Today: each affected node's periodic re-subscribe routes to whichever live axon is now closest to <code>topicId</code> and re-attaches there — no explicit subtree move, the tree heals at the speed of the refresh interval. <em>Possible:</em> redundant forwarders or proactive health checks to shorten the gap.</li>
<li><strong>Tree rebuild cost at scale.</strong> O(S × F) for S subscribers and F forwarders. Negligible at 2 K subscribers; measurable at 50 K+. <em>Possible:</em> incremental updates rather than full rebuilds.</li>
<li><strong>Gateway concentration.</strong> A skewed synaptome can yield deep-narrow trees instead of broad-shallow ones. Today: recursive delegation distributes load. <em>Possible:</em> secondary splitting on geographic cell when one gateway covers &gt; 50 % of remaining children.</li>
<li><strong>Synaptome–tree coupling.</strong> Annealing replacing a synapse that's also a forwarder leaves a stale tree until TTL. <em>Possible:</em> mark tree dirty on synapse eviction.</li>
<li><strong>Byzantine resistance.</strong> The system assumes honest nodes. <em>Possible:</em> proof-of-location, cryptographic ID binding, reputation, multi-path verification.</li>
</ul>
<br />
<p><span class="muted">Every item above is documented in Chapter 7 of the whitepaper with current mitigation and a candidate fix. None are blockers for the headline workloads in this deck — but each is a named, measurable failure mode the architecture should answer for in the next iteration.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="limitations-and-future-directions">Limitations and future directions</h2>
<p><strong>Known limitations</strong></p>
<ul>
<li><strong>Warmup dependency.</strong> N-DHT needs ~5 000 lookups before the synaptome converges. The first minute of deployment is suboptimal.</li>
<li><strong>Synaptome capacity bounded at 50.</strong> A deliberate cross-browser target. Server deployments could use 200–500.</li>
<li><strong>Locality requires geographic IDs.</strong> Without S2 prefix, regional locality collapses. <em>(Vivaldi-style RTT-only locality is future work.)</em></li>
<li><strong>Training is compute-optimizing, not path-shortening.</strong> Cannot close the bootstrap → omniscient hop gap without changes to bootstrap or annealing.</li>
<li><strong>Memory &amp; bandwidth overhead.</strong> ~50 synapses × ~80 B metadata ≈ 4 KB / node + axonal-tree state per subscribed topic. Modest, but worth measuring at 50 K+ subscribers.</li>
</ul>
<p><strong>Future directions</strong></p>
<ul>
<li><strong>RTT-driven locality (Vivaldi integration).</strong> Today's locality is structural; an embedded coordinate system could drive locality without a geo-prefix.</li>
<li><strong>Adaptive synaptome capacity.</strong> Bump capacity during join-heavy periods; prune in steady state.</li>
<li><strong>Global-pool annealing.</strong> Periodically replace the lowest-vitality synapse with a <em>globally-sampled</em> candidate rather than a 2-hop sample — closes the bootstrap → omniscient gap.</li>
<li><strong>Larger-scale evaluation.</strong> 100 K / 250 K / 1 M nodes. Preliminary 50 K data exists; larger runs need server-side simulation.</li>
<li><strong>Proof-of-location.</strong> The S2 prefix is self-declared today. A verifiable location primitive would prevent prefix forgery.</li>
</ul>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="key-takeaways">Key takeaways</h2>
<ol>
<li>
<p><strong>NH-1 collapses ~18 NX-17 rules into 12 rules organised under 5 operations.</strong> A single vitality function — <code>weight × recency</code> — drives every admission decision.</p>
</li>
<li>
<p><strong>15 % server-class nodes (highway%) captures 70 % of the available latency improvement.</strong> Realistic deployment doesn't need a uniform server fleet.</p>
</li>
<li>
<p><strong>Pub/sub on routed axonal trees: 100 % baseline, 100 % recovered delivery under 5 % churn.</strong> No K-closest replication, no gossip, no parent tracking — just routed re-subscribe.</p>
</li>
<li>
<p><strong>The simulator catches its own bugs.</strong> Skepticism — &quot;if it looks too good to be true, it is&quot; — has saved this deck from at least three retracted findings during this session.</p>
</li>
<li>
<p><strong>Locality in NH-1 is structural (S2 prefix), but the latency map is already in the routing decision.</strong> AP scoring already factors observed RTT into next-hop choice; that latency map is a natural seed for a <strong>Vivaldi-style coordinate system</strong> that could replace the S2 prefix with a <em>learned</em> locality primitive — a forward direction we plan to explore in later iterations.</p>
</li>
</ol>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team-review">Red team review</h2>
<p>Two independent red-team passes, both deliberately adversarial — <em>what would break if we shipped this tomorrow?</em></p>
<ul>
<li><strong><code>docs/red-team-analysis.md</code></strong> (2026-04-21, NX-15 / NX-17 era) — focused on transport friction, congestion, and ID-space security. Most findings remain valid because the simulator they targeted hasn't changed.</li>
<li><strong><code>docs/red-team-analysis-nh1.md</code></strong> (2026-04-29, NH-1 update) — tracks which gaps NH-1's consolidation closed and which environmental &quot;cheats&quot; still remain.</li>
</ul>
<br />
<p>The combined verdict, in one paragraph:</p>
<blockquote>
<p>The simplification of NH-1 means the team is now perfectly positioned to tackle the environmental realities that were previously masked by NX-17's complexity. The &quot;brain&quot; of the DHT is now production-ready. The next step is to make sure it can survive in a body that experiences real physical friction — connection setup delays, RPC timeouts, bandwidth saturation, jitter, and an adversarial ID space.</p>
</blockquote>
<br />
<p><strong>Three sections follow:</strong></p>
<ul>
<li><strong>Light</strong> — what the architecture got right (both reviews)</li>
<li><strong>Dark</strong> — environmental and structural gaps the simulator still hides</li>
<li><strong>Action plan</strong> — three phases of remediation, sequenced from highest behavioral impact to security hardening</li>
</ul>
<p><span class="callout"><strong>Premise.</strong> A protocol that cannot be understood cannot be secured or maintained in production. NH-1's parameter collapse from 44 → 12 closes one class of vulnerability — opacity. The remaining classes are the subject of these slides.</span></p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>
</section>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team--what-the-architecture-got-right-the-light">Red team — what the architecture got right (the Light)</h2>
<p><strong>1. LTP-driven routing affinity.</strong> Reinforcing edges based on <em>actual usage and measured latency</em> organically aligns the overlay with the physical network. Nodes build &quot;highways&quot; to reliable, fast peers rather than arbitrary XOR-close ones that may be on poor links. Both reviews flag this as the central architectural win — and it is what the 3δ floor result quantifies.</p>
<br />
<p><strong>2. Unified admission gate (NX-17 → NH-1).</strong> NX-17 had stratified eviction floors, two-tier highway management, and adaptive decay all interacting. NH-1 replaces them with <code>_addByVitality</code> scored by <code>weight × recency</code>. ~10 % latency gap under heavy caps in exchange for a robust, predictable rule that prevents parameter over-fitting.</p>
<br />
<p><strong>3. Publisher-prefix topic IDs.</strong> <code>topicId = publisher.cellPrefix(8b) ‖ hash₅₆(name)</code> deterministically pins each pub/sub root inside the publisher's S2 cell. Local traffic stays local; the publisher's synaptome is already LTP-trained for that exact region. Solves the &quot;random-root geometry&quot; problem that K-closest replication had.</p>
<br />
<p><strong>4. Honest isolation of learning (geoBits = 0 ablation).</strong> Stripping the S2 prefix and re-running shows learning <em>alone</em> yields <strong>+26 % (NX-17) / +8 % (NH-1) over Kademlia</strong> — locality and adaptation separated by measurement, not assertion.</p>
<br />
<p><strong>5. Documented failure modes.</strong> Forwarder loss under churn, tree rebuild cost, gateway concentration, synaptome-tree coupling, byzantine assumptions — every one named with current mitigation and candidate fix. The tree heals at the speed of the 10-second refresh, not magically via gossip.</p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team--remaining-gaps-the-dark">Red team — remaining gaps (the Dark)</h2>
<p>The <strong>protocol</strong> has improved. The <strong>environment</strong> it lives in has not. NH-1 over the real internet today would likely face cascading timeouts and congestion collapse before the routing logic ever gets to demonstrate itself.</p>
<br />
<p><strong>1. Frictionless connection fantasy.</strong> Nodes use a peer for routing the moment they discover it. Real WebRTC requires ICE + STUN/TURN + DTLS — <strong>1–3 s of blocking setup, two overlay round trips</strong>. Slice World &quot;unzips&quot; elegantly because hundreds of new triadic closures cost nothing; in production, that would trigger hundreds of simultaneous handshakes and drop the bridge offline.</p>
<p><strong>2. Asynchronous black holes &amp; missing timeouts.</strong> RPCs to dead nodes return instantly because the simulator knows who is alive. <strong>No timeouts, no dropped packets, no asymmetric path failures</strong> (request goes through, reply doesn't). The 100 % pub/sub recovery under 5 % churn assumes instant detection. In the wild, every churn round costs multi-second timeout windows during which messages are lost.</p>
<p><strong>3. Gateway concentration &amp; infinite bandwidth.</strong> Hop cost is <code>10 ms + propagation</code> regardless of load. A highway node carrying 10 K pub/sub messages has the same modeled cost as an idle one. <strong>Buffer saturation is invisible.</strong> AP scoring keeps hammering the &quot;best&quot; nodes — risk of <em>success disaster</em>: LTP reinforces a node until it congests, abandons it, then flocks back when it recovers (oscillatory loops).</p>
<p><strong>4. Jitter-free latency.</strong> Real RTTs fluctuate ±30 % from bufferbloat, asymmetric paths, and queueing. The simulator's distance-derived latency is monotone and clean. The EMA latency tracker has an easy job; high-frequency noise could prematurely decay good synapses or promote lucky-but-unstable ones.</p>
<p><strong>5. Sybil forgery &amp; cell eclipse.</strong> The S2 prefix is self-declared. <strong>An attacker can pick any prefix</strong> and generate IDs that land in a target cell. Proof-of-location, Vivaldi RTT clustering, and IP-ASN bounding are all unaddressed.</p>
<footer>v0.3.35 · sim v0.69.00 · 2026-04-29</footer>

<header>Neuromorphic DHT — NH-1</header>
<h2 id="red-team--action-plan-for-next-steps">Red team — action plan for next steps</h2>
<p>The simplification of NH-1 unlocks the next research phase: stop flattering the protocol with a frictionless simulator. Phases ordered from highest behavioral impact (immediate observability of friction) to security hardening (long-tail correctness).</p>
<br />
<p><strong>Phase 1 — Friction modeling</strong> <em>(highest priority — what the simulator is missing)</em></p>
<ul>
<li><strong><code>CONNECTION_SETUP_MS = 1500 – 2000 ms</code></strong> — new synapses sit in <code>PENDING</code> and are excluded from AP scoring until setup elapses.</li>
<li><strong><code>RPC_TIMEOUT_MS = 3000 ms</code></strong> — sends to silently-dropped nodes stall before iterative fallback or the next AP hop is tried.</li>
<li><strong>Request / reply RPC</strong> — refactor <code>routeMessage</code> to trace forward path <em>and</em> reverse path. Either failure fails the RPC; reply may take a different path back.</li>
</ul>
<br />
<p><strong>Phase 2 — Load &amp; noise dynamics</strong> <em>(make the protocol measurable under stress)</em></p>
<ul>
<li><strong>Load-dependent latency.</strong> <code>effective_delay = base_delay × (1 + active_msg_rate / bandwidth_cap)</code>. Saturating gateways get penalized in AP scoring and shed traffic naturally.</li>
<li><strong>Bandwidth dropping.</strong> When a node exceeds its modeled cap, drop incoming messages instead of forwarding — exposes whether AP routing routes around overload or piles into it.</li>
<li><strong>Jitter injection</strong> — add <code>Normal(0, JITTER_SIGMA)</code> to per-hop RTT. Verify the LTP EMA doesn't catastrophically oscillate; tune the EMA constant if it does.</li>
</ul>
<br />
<p><strong>Phase 3 — Structural integrity &amp; trustless locality</strong></p>
<ul>
<li><strong>Bidirectional eviction agency.</strong> When A connects to B, B independently runs its own stratified eviction to decide whether to keep the reverse edge — closes a small but real asymmetry in the current bilateral cap model.</li>
<li><strong>Vivaldi RTT integration.</strong> Replace the self-declared S2 prefix with organically learned coordinates — Sybil-resistant locality without trusting peers' self-claims.</li>
<li><strong>Geographic proof of work / IP-ASN binding.</strong> Require geo-prefix to align with a node's actual ASN/region or carry a hash-cash stamp — drastically raises the cost of cell eclipse.</li>
<li><strong>Pub/sub gateway-load mitigation.</strong> Secondary splitting on geo / RTT coordinates so an overloaded axon root sheds children rather than buffering them.</li>
</ul>
<p><span class="callout"><strong>Bottom line.</strong> The brain is production-ready. The body is not — but the body is now the next <em>measurable, scopeable</em> problem rather than a tangle of interacting mechanisms. Each phase above produces falsifiable measurements; the simulator becomes the lab bench for the next iteration.</span></p>

<h2 id="references--substrate">References — substrate</h2>
<p>The learning, decay, pruning, and topology priors that the N-DHT translates from biology and classical CS into routing-table maintenance.</p>
<br />
<h3 id="substrate-learning-decay-pruning">Substrate (learning, decay, pruning)</h3>
<ul>
<li>Hebb · <em>The Organization of Behavior</em> (1949) — synaptic potentiation</li>
<li>Ebbinghaus · <em>Über das Gedächtnis</em> (1885) — exponential forgetting curve</li>
<li>Frey &amp; Morris · <em>Synaptic tagging and the late phase of LTP</em> (Nature 1997) — biological analog of weight × recency retention</li>
<li>LeCun, Denker, Solla · <em>Optimal Brain Damage</em> (NeurIPS 1989) — prune lowest-magnitude connections</li>
<li>O'Neil, O'Neil, Weikum · <em>The LRU-K Page Replacement Algorithm</em> (SIGMOD 1993) — multi-history recency for cache replacement</li>
<li>Watts &amp; Strogatz · <em>Collective Dynamics of Small-World Networks</em> (Nature 1998)</li>
<li>Google · <em>S2 Geometry Library</em> (2011) — <a href="https://s2geometry.io/">https://s2geometry.io/</a></li>
</ul>
